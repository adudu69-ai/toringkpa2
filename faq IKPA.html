let _sMap=null;
function getSM(){if(!_sMap&&window.SATKER_DB?.length){_sMap=new Map();window.SATKER_DB.forEach(r=>_sMap.set(r[0],r));}return _sMap;}
function lookupSatker(k){const m=getSM();if(!m)return null;return m.get(String(k).trim().padStart(6,'0'))||null;}
function fmtDate(s){if(!s)return'';const[y,mo,d]=s.split('-');return`${parseInt(d)} ${MOS[parseInt(mo)-1]} ${y}`;}
function fmtDateShort(s){if(!s)return'';const[y,mo,d]=s.split('-');return`${d}/${mo}/${y}`;}
function todayStr(){return new Date().toISOString().split('T')[0];}
function isActive(op){return op.tgl_akhir>=todayStr();}
function lsGet(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function validDates(mulai,akhir){return mulai&&akhir&&akhir>mulai;}

function genNotifR(op){
  return`Dapat kami sampaikan bahwa saat ini sedang dilakukan proses open period kembali atas pengisian realisasi capaian output satker ${op.kode_satker} periode ${op.periode_bulan} yang dibuka s.d ${fmtDate(op.tgl_akhir)} oleh Tim Teknis aplikasi. Harap menunggu dan selalu melakukan pengecekan secara berkala pada aplikasi MyIntress berkaitan dengan status pembukaan periode capaian output.`;
}
function genNotifT(op){
  return`Berdasarkan hasil konfirmasi ke tim teknis, saat ini sedang dilakukan proses pembukaan dispensasi pengisian target Satker ${op.kode_satker} di SAKTI. Open periode target tersebut akan dibuka sampai tanggal ${fmtDate(op.tgl_akhir)}. Mohon kesediaannya untuk menunggu beberapa saat dan mengecek kembali terkait pembukaan untuk RO tersebut di Aplikasi SAKTI Saudara. Pengisian pada Aplikasi SAKTI dapat dilakukan dengan klik baris RO >> klik tombol Ubah >> Isi/sesuaikan TPCRO dan TRVRO pada kolom Form Input yang terbuka >> Simpan >> Kirim.`;
}
function genNotif(op){return op.type==='target'?genNotifT(op):genNotifR(op);}

function printFAQ(faq,topicId){
  const topics=topicId?[IND.find(i=>i.id===topicId)]:IND;
  let h=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>FAQ IKPA</title><style>
  body{font-family:Arial,sans-serif;font-size:11pt;line-height:1.6;margin:30px;color:#1e293b}
  h1{color:#1d4ed8;font-size:16pt;margin-bottom:4px} .sub{color:#64748b;font-size:9pt;border-bottom:2px solid #1d4ed8;padding-bottom:8px;margin-bottom:20px}
  h2{color:#1e3a8a;font-size:12pt;margin:18px 0 8px;padding:6px 10px;background:#eff6ff;border-left:4px solid #1d4ed8}
  .bw{font-size:9pt;color:#64748b;font-weight:normal;margin-left:6px} .qt{font-weight:bold;margin:10px 0 4px}
  .qa{color:#374151;white-space:pre-line;margin-left:14px;margin-bottom:10px}
  .ft{margin-top:40px;font-size:8pt;color:#94a3b8;border-top:1px solid #e2e8f0;padding-top:8px;text-align:center}
  .np{text-align:center;margin:20px} @media print{.np{display:none}}
  </style></head><body>`;
  h+=`<h1>FAQ IKPA — Indikator Kinerja Pelaksanaan Anggaran</h1>`;
  h+=`<div class="sub">DJPb Kementerian Keuangan · ${new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'})}</div>`;
  topics.forEach(t=>{const qs=faq[t.id]||[];if(!qs.length)return;
    h+=`<h2>${t.icon} ${t.no}. ${t.label}<span class="bw">(Bobot: ${t.bobot})</span></h2>`;
    qs.forEach((q,i)=>{h+=`<div class="qt">${i+1}. ${q.q}</div><div class="qa">${q.a.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>`;});
  });
  h+=`<div class="ft">FAQ IKPA · ${new Date().toISOString()}</div>`;
  h+=`<div class="np"><button onclick="window.print()" style="padding:10px 24px;background:#1d4ed8;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer">🖨️ Print / Simpan PDF</button></div>`;
  h+=`</body></html>`;
  // Use hidden iframe — avoids popup blocker entirely
  const old=document.getElementById('_pf');if(old)document.body.removeChild(old);
  const fr=document.createElement('iframe');
  fr.id='_pf';
  fr.style.cssText='position:fixed;top:-9999px;left:-9999px;width:900px;height:600px;border:none;visibility:hidden;';
  document.body.appendChild(fr);
  const doc=fr.contentDocument||fr.contentWindow.document;
  doc.open();doc.write(h);doc.close();
  setTimeout(()=>{
    fr.style.visibility='visible';
    fr.contentWindow.focus();
    fr.contentWindow.print();
    setTimeout(()=>{if(document.body.contains(fr))document.body.removeChild(fr);},2000);
  },400);
}

function exportXL(ops,type,filterAdmin){
  // Filter by type, then by admin if specified (Fix #3: cluster by admin)
  const rows=ops.filter(o=>o.type===type&&(!filterAdmin||o.admin_name===filterAdmin));
  if(rows.length===0){alert(`Tidak ada data ${type} ${filterAdmin?'untuk '+filterAdmin:''}yang tersimpan.`);return;}
  const now=new Date();const ts=now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})+' WIB';
  const adminTag=filterAdmin?` - ${filterAdmin}`:'';
  let aoa,sn,fn;
  if(type==='realisasi'){
    aoa=[[`OPEN PERIOD REALISASI CAPAIAN OUTPUT (per ${ts})${adminTag}`],
      ['Kanwil DJPB','KPPN','Kode Satker','Nama Satker','K/L','Periode dari','s.d','Periode s.d','Tahun Anggaran','Tanggal Mulai','Tanggal Akhir','Admin'],
      ...rows.map(o=>[o.nm_kanwil||'',o.nm_kppn||'',o.kode_satker,o.nm_satker||'',o.kl||'',o.periode_from||'','s.d',o.periode_to||'',o.tahun||'',fmtDateShort(o.tgl_mulai),fmtDateShort(o.tgl_akhir),o.admin_name||''])];
    sn='Realisasi Caput';
    fn=`rekap_realisasi${filterAdmin?'_'+filterAdmin.replace(/\s/g,'_'):''}_${now.toISOString().split('T')[0]}.xlsx`;
  }else{
    aoa=[[`DISPENSASI TARGET OUTPUT (per ${ts})${adminTag}`],
      ['Tahun Anggaran','Kode Satker','Nama Satker','K/L','Kode Program','Kode Kegiatan','Kode KRO','Kode RO','Periode Awal Dibuka','Tanggal Mulai','Tanggal Akhir','Admin'],
      ...rows.map(o=>[o.tahun_anggaran||'',o.kode_satker,o.nm_satker||'',o.kl||'',o.kd_program||'',o.kd_kegiatan||'',o.kd_kro||'',o.kd_ro||'',o.periode_awal||'',fmtDateShort(o.tgl_mulai),fmtDateShort(o.tgl_akhir),o.admin_name||''])];
    sn='Dispensasi Target Caput';
    fn=`rekap_target${filterAdmin?'_'+filterAdmin.replace(/\s/g,'_'):''}_${now.toISOString().split('T')[0]}.xlsx`;
  }
  const ws=XLSX.utils.aoa_to_sheet(aoa);const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,sn);XLSX.writeFile(wb,fn);
}

function parseXLDate(v){
  if(!v)return'';
  if(typeof v==='number'){const d=XLSX.SSF.parse_date_code(v);return`${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;}
  const s=String(v).trim();
  const m1=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);if(m1)return`${m1[3]}-${m1[2].padStart(2,'0')}-${m1[1].padStart(2,'0')}`;
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  return s;
}

function parseXLUpload(file,type,adminName){
  return new Promise((res,rej)=>{
    const rd=new FileReader();
    rd.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        const recs=[];
        rows.slice(2).forEach(r=>{
          if(type==='realisasi'){
            const kode=String(r[3]||'').trim();if(!kode)return;
            const si=lookupSatker(kode)||[];const pf=String(r[4]||'').trim(),pt=String(r[6]||'').trim();
            recs.push({id:Date.now()+'_'+Math.random().toString(36).slice(2),type:'realisasi',
              kode_satker:kode.padStart(6,'0'),nm_satker:si[1]||'',kl:si[2]||'',
              kd_kppn:si[3]||String(r[1]||'').trim(),nm_kppn:si[4]||'',nm_kanwil:si[5]||String(r[0]||'').trim(),
              periode_from:pf,periode_to:pt,
              periode_bulan:pf&&pt?(pf===pt?`${pf} ${r[7]||''}`:`${pf} s.d ${pt} ${r[7]||''}`):'-',
              tahun:String(r[7]||'2026').trim(),tgl_mulai:parseXLDate(r[8]),tgl_akhir:parseXLDate(r[9]),
              admin_name:adminName,created_at:new Date().toISOString()});
          }else{
            const kode=String(r[1]||'').trim();if(!kode)return;
            const si=lookupSatker(kode)||[];
            recs.push({id:Date.now()+'_'+Math.random().toString(36).slice(2),type:'target',
              tahun_anggaran:String(r[0]||'2026').trim(),kode_satker:kode.padStart(6,'0'),nm_satker:si[1]||'',kl:si[2]||'',
              kd_program:String(r[2]||'').trim(),kd_kegiatan:String(r[3]||'').trim(),
              kd_kro:String(r[4]||'').trim(),kd_ro:String(r[5]||'').trim(),
              periode_awal:String(r[6]||'').trim(),tgl_mulai:parseXLDate(r[7]),tgl_akhir:parseXLDate(r[8]),
              admin_name:adminName,created_at:new Date().toISOString()});
          }
        });res(recs);
      }catch(e){rej(e);}
    };rd.readAsArrayBuffer(file);
  });
}

  function fillSatker(kode,isT){
    const clean=kode.replace(/\D/g,'');
    if(clean.length>=6){
      const r=lookupSatker(clean);
      if(!isT)setOpForm(f=>({...f,kode:clean,nm_satker:r?.[1]||'',kl:r?.[2]||'',kd_kppn:r?.[3]||'',nm_kppn:r?.[4]||'',kanwil:r?.[5]||''}));
      else setOpFormT(f=>({...f,kode:clean,nm_satker:r?.[1]||'',kl:r?.[2]||''}));
    }else{
      if(!isT)setOpForm(f=>({...f,kode:clean}));
      else setOpFormT(f=>({...f,kode:clean}));
    }
  }

  function doOpSearch(){
    const k=opSearch.trim().padStart(6,'0');
    if(!k||k==='000000')return;
    const t=todayStr();
    const active=ops.filter(o=>o.kode_satker===k&&o.type===opType&&o.tgl_akhir>=t);
    if(active.length>0){setOpRecord(active[0]);setOpMulti(active);setOpState(active.length>1?'multi':'found');}
    else{
      const r=lookupSatker(k);
      if(opType==='realisasi')setOpForm({...initFR(),kode:k,nm_satker:r?.[1]||'',kl:r?.[2]||'',kd_kppn:r?.[3]||'',nm_kppn:r?.[4]||'',kanwil:r?.[5]||''});
      else setOpFormT({...initFT(),kode:k,nm_satker:r?.[1]||'',kl:r?.[2]||''});
      setOpRecord(null);setOpState('new');setDateErr('');
    }
  }

  function checkDates(mulai,akhir){
    if(mulai&&akhir&&akhir<=mulai){setDateErr('⛔ Tanggal ditutup harus lebih besar dari tanggal mulai.');}
    else setDateErr('');
  }

  function doSaveR(){
    const f=opForm;
    if(!f.kode||!f.tgl_mulai||!f.tgl_akhir||!f.periode_from||!f.periode_to)return;
    if(!validDates(f.tgl_mulai,f.tgl_akhir)){setDateErr('⛔ Tanggal ditutup harus lebih besar dari tanggal mulai.');return;}
    const pb=f.periode_from===f.periode_to?`${f.periode_from} ${f.tahun}`:`${f.periode_from} s.d ${f.periode_to} ${f.tahun}`;
    const rec={id:Date.now()+'',type:'realisasi',kode_satker:f.kode.padStart(6,'0'),nm_satker:f.nm_satker,kl:f.kl,
      kd_kppn:f.kd_kppn,nm_kppn:f.nm_kppn,nm_kanwil:f.kanwil,
      periode_from:f.periode_from,periode_to:f.periode_to,periode_bulan:pb,tahun:f.tahun,
      tgl_mulai:f.tgl_mulai,tgl_akhir:f.tgl_akhir,admin_name:opAdmin,created_at:new Date().toISOString()};
    const next=[...ops,rec];saveOps(next);setOpRecord(rec);setOpState('saved');setOpForm(initFR());setDateErr('');
  }

  function doSaveT(){
    const f=opFormT;
    // Fix #4: periode_awal also required now
    if(!f.kode||!f.tgl_mulai||!f.tgl_akhir||!f.kd_program||!f.kd_kegiatan||!f.kd_kro||!f.kd_ro||!f.periode_awal)return;
    if(!validDates(f.tgl_mulai,f.tgl_akhir)){setDateErr('⛔ Tanggal ditutup harus lebih besar dari tanggal mulai.');return;}
    const rec={id:Date.now()+'',type:'target',tahun_anggaran:f.tahun,kode_satker:f.kode.padStart(6,'0'),
      nm_satker:f.nm_satker,kl:f.kl,kd_program:f.kd_program,kd_kegiatan:f.kd_kegiatan,
      kd_kro:f.kd_kro,kd_ro:f.kd_ro,periode_awal:f.periode_awal,
      tgl_mulai:f.tgl_mulai,tgl_akhir:f.tgl_akhir,admin_name:opAdmin,created_at:new Date().toISOString()};
    const next=[...ops,rec];saveOps(next);setOpRecord(rec);setOpState('saved');setOpFormT(initFT());setDateErr('');
  }

  function resetOp(){setOpState('idle');setOpRecord(null);setOpMulti([]);setOpSearch('');setDateErr('');}
  function delOp(id){const next=ops.filter(o=>o.id!==id);saveOps(next);if(opRecord?.id===id)resetOp();setOpMulti(prev=>prev.filter(o=>o.id!==id));}

  function copy(text,k){
    (navigator.clipboard?navigator.clipboard.writeText(text):new Promise(r=>{const t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);r();}))
    .then(()=>{setCopied(k);setTimeout(()=>setCopied(''),2500);});
  }

  async function handleUpload(e){
    const file=e.target.files?.[0];if(!file)return;
    setUpStatus('⏳ Memproses...');
    try{
      // Pass empty string so imported records have no admin_name (Fix #2)
      const recs=await parseXLUpload(file,opType,'');
      // Use functional update to avoid stale closure on ops (Fix #2)
      setOps(prev=>{
        const next=[...prev,...recs];
        lsSet('ik-ops3',next);
        return next;
      });
      setUpStatus(`✅ ${recs.length} data berhasil diimpor!`);
    }catch(err){
      console.error(err);
      setUpStatus('❌ Gagal membaca file. Pastikan format sesuai.');
    }
    e.target.value='';setTimeout(()=>setUpStatus(''),5000);
  }

  function handleAddFaq(){
    if(!addTopic||!addQ.trim()||!addA.trim())return;
    const item={id:Date.now()+'',q:addQ.trim(),a:addA.trim()};
    saveFaq({...faq,[addTopic]:[...(faq[addTopic]||[]),item]});
    setShowAdd(false);setAddQ('');setAddA('');setAddTopic('');
  }
  function delFaq(tid,qid){saveFaq({...faq,[tid]:faq[tid].filter(q=>q.id!==qid)});if(qItem?.id===qid)setQItem(null);}

  const srch=search.trim();
  const searchRes=srch?IND.flatMap(ind=>(faq[ind.id]||[]).map(q=>({...q,ind}))).filter(x=>x.q.toLowerCase().includes(srch.toLowerCase())||x.a.toLowerCase().includes(srch.toLowerCase())):[];
  const curQs=topic?(faq[topic.id]||[]):[];
  const filteredOps=ops.filter(o=>o.type===opType&&isActive(o));

  function previewNotifR(){
    const f=opForm;if(!f.kode||!f.periode_from||!f.periode_to||!f.tgl_akhir)return null;
    const pb=f.periode_from===f.periode_to?`${f.periode_from} ${f.tahun}`:`${f.periode_from} s.d ${f.periode_to} ${f.tahun}`;
    return genNotifR({kode_satker:f.kode.padStart(6,'0'),periode_bulan:pb,tgl_akhir:f.tgl_akhir});
  }
  function previewNotifT(){
    const f=opFormT;if(!f.kode||!f.tgl_akhir)return null;
    return genNotifT({kode_satker:f.kode.padStart(6,'0'),tgl_akhir:f.tgl_akhir});
  }

      :[['Kode Satker',rec.kode_satker],['Tahun',rec.tahun_anggaran||'-'],['Program/Keg',`${rec.kd_program||'-'}/${rec.kd_kegiatan||'-'}`],['KRO/RO',`${rec.kd_kro||'-'}/${rec.kd_ro||'-'}`],['Periode Awal',rec.periode_awal||'-'],['Tgl Mulai',fmtDate(rec.tgl_mulai)],['Dibuka s.d',fmtDate(rec.tgl_akhir)],['Admin',rec.admin_name||'-']];

              </select>
            </div>
            <div style={{marginBottom:8}}>
              <label style={{fontSize:10,color:'var(--tx3)',display:'block',marginBottom:4}}>Pertanyaan *</label>
              <input value={addQ} onChange={e=>setAddQ(e.target.value)} placeholder="Tuliskan pertanyaan yang sering diajukan..." style={inp}/>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:10,color:'var(--tx3)',display:'block',marginBottom:4}}>Jawaban *</label>
              <textarea value={addA} onChange={e=>setAddA(e.target.value)} rows={5} placeholder="Tuliskan jawaban lengkap... (gunakan • untuk bullet, Enter untuk paragraf baru)" style={{...inp,lineHeight:1.6}}/>
            </div>
            <div style={{display:'flex',gap:7,justifyContent:'flex-end'}}>
              <button onClick={()=>{setShowAdd(false);setAddQ('');setAddA('');}} style={B('var(--surf)','var(--tx3)',{border:'1px solid var(--bdr)',padding:'7px 13px'})}>Batal</button>
              <button onClick={handleAddFaq} disabled={!addTopic||!addQ||!addA}
                style={B('var(--acc)','#fff',{opacity:(!addTopic||!addQ||!addA)?.45:1,padding:'7px 15px'})}>💾 Simpan FAQ</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
