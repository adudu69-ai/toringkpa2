/* ============================================================

  { provinsi: "Sulawesi Selatan",     kd: "23", aliases: ["MAKASSAR","SULAWESI SELATAN","SULSEL"] },
  { provinsi: "Sulawesi Barat",       kd: "32", aliases: ["SULAWESI BARAT","SULBAR","MAMUJU"] },
  { provinsi: "Sulawesi Tengah",      kd: "24", aliases: ["PALU","SULAWESI TENGAH","SULTENG"] },
  { provinsi: "Sulawesi Tenggara",    kd: "25", aliases: ["KENDARI","SULAWESI TENGGARA","SULTRA"] },
  { provinsi: "Gorontalo",            kd: "26", aliases: ["GORONTALO"] },
  { provinsi: "Sulawesi Utara",       kd: "27", aliases: ["MANADO","SULAWESI UTARA","SULUT"] },
  { provinsi: "Maluku Utara",         kd: "28", aliases: ["TERNATE","MALUKU UTARA","MALUT"] },
  { provinsi: "Maluku",               kd: "29", aliases: ["AMBON","MALUKU"] },
  { provinsi: "Papua Barat",          kd: "33", aliases: ["PAPUA BARAT","MANOKWARI"] },
  { provinsi: "Papua",                kd: "30", aliases: ["JAYAPURA","PAPUA"] },
];

// Lookups
const BY_KD = Object.fromEntries(KANWIL_MAPPING.map(k => [k.kd, k]));
function normName(s) { return String(s||"").toUpperCase().trim().replace(/\s+/g," ").replace(/\./g,""); }
function findKanwilByName(name) {
  if (!name) return null;
  const n = normName(name);
  for (const k of KANWIL_MAPPING) {
    if (normName(k.provinsi) === n) return k;
    for (const a of k.aliases) if (normName(a) === n) return k;
  }
  // Partial match fallback
  for (const k of KANWIL_MAPPING) {
    for (const a of k.aliases) if (n.includes(normName(a)) || normName(a).includes(n)) return k;
  }
  return null;
}
function findKanwilByKd(kd) {
  if (!kd) return null;
  const clean = String(kd).replace(/^'/,"").padStart(2,"0");
  return BY_KD[clean] || null;
}

const ASPEK_FIELDS = {
  kepatuhan: ["KESESUAIAN_PNBP","KETEPATAN_WAKTU","SURAT_DISPENSASI","KESESUAIAN_TARIF","TAMBAHAN_KEPATUHAN"],
  pelaporan: ["KESESUAIAN_KAS","KESESUAIAN_NOMOR","KETEPATAN_LPJ","KEPATUHAN_SALDO","KESESUAIAN_TRANSAKSI","TAMBAHAN_PELAPORAN"],
  kendalaBelanja: ["TREN_BELANJA","MASALAH_PENGANGGARAN","MASALAH_KEGIATAN","MASALAH_REGULASI","MASALAH_MP","KESESUAIAN_REAL_RPD","KENDALA_BELANJA_LAINNYA"],
  permasalahan: ["KENDALA_INTERNAL","KENDALA_EKSTERNAL","KENDALA_JARINGAN_APP","KENDALA_LOKASI","KESESUAIAN_PNBP_TARGET","KENDALA_PENERIMAAN_LAINNYA"],
  rekomendasi: ["REKOMENDASI"],
};

const PERIODE = "Triwulan II/Semester I 2025";

/* Emptiness — "-", "tidak ada", "nihil" → kosong */
function isEmpty(v) {
  if (v === null || v === undefined) return true;
  const s = String(v).trim().toLowerCase();
  return s === "" || s === "-" || s === "tidak ada" || s === "nihil" || s === "n/a" || s === "na";
}
const aspekTerisi = (rec, fields) => fields.some(f => !isEmpty(rec[f]));

/* Index calculation */
function hitungIndeksKetepatanWaktu(tglPenyampaian, batasWaktu) {
  if (!tglPenyampaian) return 0;
  const d1 = new Date(tglPenyampaian);
  const d2 = new Date(batasWaktu);
  if (isNaN(d1) || isNaN(d2)) return 0;
  const diffDays = Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
  if (diffDays >= 2) return 5;
  if (diffDays === 1) return 4.25;
  if (diffDays === 0) return 4.1;
  if (diffDays < 0 && diffDays >= -7) return 3;
  if (diffDays < -7) return 1;
  return 0;
}
function hitungIndeksPemenuhan(record) {
  const aspek = ["kepatuhan","pelaporan","kendalaBelanja","permasalahan"];
  const terisi = aspek.filter(a => aspekTerisi(record, ASPEK_FIELDS[a]));
  const rekomendasiTerisi = !isEmpty(record.REKOMENDASI);
  const analisis = record.ANALISIS || "Komprehensif";
  if (terisi.length === 4 && rekomendasiTerisi && analisis === "Komprehensif") return 5;
  if (terisi.length === 4 && rekomendasiTerisi && analisis === "Cukup Komprehensif") return 4.1;
  if (terisi.length === 4 && analisis === "Kurang Komprehensif") return 3.5;
  if (terisi.length >= 2 && terisi.length < 4) return 3;
  if (terisi.length === 1) return 2;
  return 1;
}
function recompute(rec, deadline) {
  rec.indeksKetepatanWaktu = hitungIndeksKetepatanWaktu(rec.tglPenyampaian, deadline);
  rec.indeksPemenuhan = hitungIndeksPemenuhanCombined(rec);
  rec.indeksKualitas = +((rec.indeksKetepatanWaktu + rec.indeksPemenuhan) / 2).toFixed(3);
  return rec;
}

/* ============================================================
   KESIMPULAN SPLITTER — handle "4) Aspek..." & "Aspek Xxx:"
   Tidak memotong/memodifikasi teks.
   ============================================================ */
function splitKesimpulan(text) {
  const result = { kepatuhan: "", pelaporan: "", kendalaBelanja: "", permasalahan: "" };
  if (!text) return result;
  const t = String(text);

  // Expanded trigger patterns — sesuai request user
  const markers = [
    { key: "kepatuhan",      re: /(?:^|\n|\s)(?:\d+[\.\)]\s*)?(?:aspek\s+)?(?:kepatuhan\s+pemungutan(?:\s+dan\s+penyetoran)?|kesesuaian\s+pembayaran\/?\s*penyetoran\s+PNBP|kepatuhan\s+(?:dan\s+)?penyetoran)[^\n]*?(?=[:.]|$)/gi },
    { key: "pelaporan",      re: /(?:^|\n|\s)(?:\d+[\.\)]\s*)?(?:aspek\s+)?(?:pelaporan\s+dan\s+penatausahaan|pelaporan\s+(?:serta\s+)?penatausahaan)[^\n]*?(?=[:.]|$)/gi },
    { key: "kendalaBelanja", re: /(?:^|\n|\s)(?:\d+[\.\)]\s*)?(?:aspek\s+)?(?:kendala\s+pelaksanaan\s+belanja\s+PNBP|(?:aspek\s+)?belanja\s+PNBP|kualitas\s+proyeksi\s+dan\s+realisasi\s+belanja|kendala\s+dalam\s+pelaksanaan\s+belanja|pelaksanaan\s+belanja\s+PNBP|proyeksi\s+(?:penerimaan\s+dan\s+)?belanja\s+PNBP|kendala\s+pelaksanaan\s+anggaran)[^\n]*?(?=[:.]|$)/gi },
    { key: "permasalahan",   re: /(?:^|\n|\s)(?:\d+[\.\)]\s*)?(?:aspek\s+)?(?:permasalahan\s+penerimaan\s+PNBP|(?:aspek\s+)?penerimaan\s+PNBP|kualitas\s+proyeksi\s+dan\s+setoran\s+penerimaan|kendala\s+dalam\s+capaian\s+setoran)[^\n]*?(?=[:.]|$)/gi },
  ];

  const positions = [];
  markers.forEach(m => {
    m.re.lastIndex = 0;
    const match = m.re.exec(t);
    if (match) positions.push({ key: m.key, idx: match.index });
  });
  positions.sort((a, b) => a.idx - b.idx);

  // "Secara umum" catch-all: kalau tidak ada aspek markers,
  // tapi ada frasa "secara umum/keseluruhan... sesuai... regulasi/peraturan",
  // isi semua aspek dengan teks yang sama
  if (positions.length === 0) {
    if (/secara\s+(?:umum|keseluruhan)\s+[\s\S]{0,200}(?:sesuai\s+(?:dengan\s+)?(?:kebijakan|regulasi|peraturan|ketentuan)|telah\s+(?:berjalan|dilaksanakan|terlaksana)|tidak\s+(?:ada\s+)?(?:kendala|permasalahan))/i.test(t)) {
      result.kepatuhan = t.trim();
      result.pelaporan = t.trim();
      result.kendalaBelanja = t.trim();
      result.permasalahan = t.trim();
    } else {
      result.kepatuhan = t.trim();
    }
    return result;
  }

  for (let i = 0; i < positions.length; i++) {
    const start = positions[i].idx;
    const end = i + 1 < positions.length ? positions[i+1].idx : t.length;
    result[positions[i].key] = t.slice(start, end).trim();
  }
  return result;
}

/* ============================================================
   PDF PARSING — ekstrak Nomor ND, tanggal, Kanwil
   ============================================================ */
const BULAN_ID = {
  "januari":0,"februari":1,"maret":2,"april":3,"mei":4,"juni":5,
  "juli":6,"agustus":7,"september":8,"oktober":9,"november":10,"desember":11,
};

/* Ekstrak teks halaman 1 saja (KOP Nota Dinas ada di header)
   Gunakan posisi Y untuk deteksi line break — bantu regex melihat layout. */
async function extractPdfHeaderText(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const page = await pdf.getPage(1);
  const content = await page.getTextContent();
  // Urutkan item berdasar posisi Y (atas dulu), lalu X
  const items = content.items.slice().sort((a, b) => {
    const ay = a.transform[5], by = b.transform[5];
    if (Math.abs(ay - by) > 2) return by - ay;
    return a.transform[4] - b.transform[4];
  });
  let text = "";
  let lastY = null;
  items.forEach(it => {
    const y = it.transform[5];
    if (lastY !== null && Math.abs(y - lastY) > 2) text += "\n";
    text += it.str + " ";
    lastY = y;
  });
  return text;
}

/* Ekstrak seluruh halaman PDF (untuk fallback Ikhtisar) */
async function extractPdfFullText(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    // Pakai posisi Y untuk line breaks
    const items = content.items.slice().sort((a, b) => {
      const ay = a.transform[5], by = b.transform[5];
      if (Math.abs(ay - by) > 2) return by - ay;
      return a.transform[4] - b.transform[4];
    });
    let lastY = null;
    items.forEach(it => {
      const y = it.transform[5];
      if (lastY !== null && Math.abs(y - lastY) > 2) text += "\n";
      text += it.str + " ";
      lastY = y;
    });
    text += "\n";
  }
  return text;
}

/* Ekstrak BODY PDF (skip KOP & skip closing) */
function extractPdfBody(text) {
  // Skip KOP: cari "Tanggal : DD Month YYYY", ambil setelahnya
  const kopEnd = text.match(/Tanggal\s*:?\s*\d{1,2}\s+(?:Januari|Februari|Maret|April|Mei|Juni|Juli|Agustus|September|Oktober|November|Desember)\s+\d{4}/i);
  const bodyStart = kopEnd ? kopEnd.index + kopEnd[0].length : 0;
  // End body sebelum closing
  const rest = text.slice(bodyStart);
  const closingMatch = rest.match(/Demikian\s+(?:kami|hal|atas|disampaikan)|Ditandatangani\s+secara\s+elektronik|Atas\s+perhatian/i);
  const bodyEnd = closingMatch ? bodyStart + closingMatch.index : text.length;
  return text.slice(bodyStart, bodyEnd).trim();
}

/* Parse PDF body → sections per aspek + gambaran umum + rekomendasi */
function parsePdfBody(text) {
  const empty = { gambaranUmum: "", kepatuhan: "", pelaporan: "", kendalaBelanja: "", permasalahan: "", rekomendasi: "", _hasContent: false };
  if (!text) return empty;
  const body = extractPdfBody(text);
  if (!body || body.length < 50) return empty;

  // Marker tiap aspek — pattern fleksibel
  const markers = [
    { key: "kepatuhan",      re: /aspek\s+kepatuhan/i },
    { key: "pelaporan",      re: /aspek\s+pelaporan/i },
    { key: "kendalaBelanja", re: /aspek\s+(?:kendala|pelaksanaan\s+(?:anggaran|belanja|kegiatan))/i },
    { key: "permasalahan",   re: /aspek\s+permasalahan/i },
    { key: "rekomendasi",    re: /direkomendasikan\s+sebagai|(?:^|\n)\s*(?:rekomendasi|saran)\s*[:\.\)]|berikut\s+rekomendasi/im },
  ];

  // Cari posisi marker, lalu mundur ke awal kalimat/penomoran agar konten lengkap
  const positions = [];
  markers.forEach(m => {
    const match = body.match(m.re);
    if (match) {
      let start = match.index;
      // Mundur cari awal poin penomoran "N." atau line start
      const lookback = body.slice(Math.max(0, start - 250), start);
      const numMatch = lookback.match(/(?:^|\n)\s*(\d+)[\.\)]\s/g);
      if (numMatch) {
        const lastNum = numMatch[numMatch.length - 1];
        const numPos = lookback.lastIndexOf(lastNum);
        if (numPos >= 0) start = Math.max(0, start - 250) + numPos + (lastNum.startsWith("\n") ? 1 : 0);
      } else {
        const lineStart = lookback.lastIndexOf("\n");
        if (lineStart >= 0) start = Math.max(0, start - 250) + lineStart + 1;
      }
      positions.push({ key: m.key, idx: start });
    }
  });
  positions.sort((a, b) => a.idx - b.idx);

  const result = { ...empty };
  if (positions.length === 0) {
    result.gambaranUmum = body.trim();
    result._hasContent = body.length > 100;
    return result;
  }

  // Gambaran Umum = dari poin 1 (jika ada) sampai marker aspek pertama
  let guStart = 0;
  const firstPoint = body.match(/(?:^|\n)\s*1\.\s/);
  if (firstPoint) guStart = firstPoint.index;
  result.gambaranUmum = body.slice(guStart, positions[0].idx).trim();

  // Setiap aspek dari markernya sampai marker berikutnya
  for (let i = 0; i < positions.length; i++) {
    const start = positions[i].idx;
    const end = i + 1 < positions.length ? positions[i+1].idx : body.length;
    result[positions[i].key] = body.slice(start, end).trim();
  }
  result._hasContent = !!(result.kepatuhan || result.pelaporan || result.kendalaBelanja || result.permasalahan || result.rekomendasi || result.gambaranUmum);
  return result;
}

function parseNdInfo(text, filename) {
  // Pastikan ini benar-benar Nota Dinas (bukan Undangan/Surat lain)
  // Regex toleran whitespace: "ND - 573 / WPB . 05 / 2025"
  let nomor = null;
  const ndPermissive = /(?<![A-Za-z])ND\s*-\s*(\d+)\s*\/\s*WPB\s*\.?\s*(\d+)\s*\/\s*(\d{4})/i;
  try {
    const ndMatch = text.match(ndPermissive) || filename.match(ndPermissive);
    if (ndMatch) nomor = `ND-${ndMatch[1]}/WPB.${String(ndMatch[2]).padStart(2,"0")}/${ndMatch[3]}`;
  } catch (e) {
    // Browser tanpa lookbehind: scan semua match prefix
    const all = [...text.matchAll(/([A-Za-z]{0,4})\s*-\s*(\d+)\s*\/\s*WPB\s*\.?\s*(\d+)\s*\/\s*(\d{4})/gi)];
    const ndOnly = all.find(m => m[1].toUpperCase() === "ND");
    if (ndOnly) nomor = `ND-${ndOnly[2]}/WPB.${String(ndOnly[3]).padStart(2,"0")}/${ndOnly[4]}`;
  }

  // Tanggal: prioritas label "Tanggal :" di KOP
  const tglLabelRe = /Tanggal\s*[:\.\-]?\s*(\d{1,2})\s+(Januari|Februari|Maret|April|Mei|Juni|Juli|Agustus|September|Oktober|November|Desember)\s+(\d{4})/i;
  let dateMatch = text.match(tglLabelRe);
  if (!dateMatch) {
    dateMatch = text.match(/(\d{1,2})\s+(Januari|Februari|Maret|April|Mei|Juni|Juli|Agustus|September|Oktober|November|Desember)\s+(\d{4})/i);
  }
  let tgl = null;
  if (dateMatch) {
    const day = parseInt(dateMatch[1], 10);
    const mo = BULAN_ID[dateMatch[2].toLowerCase()];
    const yr = parseInt(dateMatch[3], 10);
    tgl = new Date(Date.UTC(yr, mo, day)).toISOString().slice(0,10);
  }

  // Kanwil: prioritas frasa "Provinsi <Nama>" di KOP
  let kanwil = null;
  const provRe = /Provinsi\s+([A-Z][A-Za-z\.\s]+?)(?=\s+(?:Semester|Triwulan|Tahun|Periode|menyampaikan)|[,\.\n])/i;
  const m1 = text.match(provRe);
  if (m1) {
    const found = findKanwilByName(m1[1].trim());
    if (found) kanwil = found.provinsi;
  }
  if (!kanwil) {
    for (const k of KANWIL_MAPPING) {
      for (const a of k.aliases) {
        const reA = new RegExp("\\b" + a.replace(/[\s\.]/g,"[\\s\\.]") + "\\b", "i");
        if (reA.test(text)) { kanwil = k.provinsi; break; }
      }
      if (kanwil) break;
    }
  }
  if (!kanwil) {
    for (const k of KANWIL_MAPPING) {
      const re = new RegExp(k.provinsi.replace(/[\s\.]+/g,"[\\s\\.\\-_]*"), "i");
      if (re.test(filename)) { kanwil = k.provinsi; break; }
    }
  }
  return { nomor, tgl, kanwilHint: kanwil };
}

/* ============================================================
   EXCEL / CSV PARSING
   ============================================================ */
async function readSheet(file) {
  const buf = await file.arrayBuffer();
  // Untuk CSV, baca sebagai text dengan delimiter auto
  if (/\.csv$/i.test(file.name)) {
    const text = new TextDecoder("utf-8").decode(buf);
    const firstLine = text.split(/\r?\n/)[0] || "";
    const delim = firstLine.split(";").length > firstLine.split(",").length ? ";" : ",";
    const wb = XLSX.read(text, { type: "string", FS: delim, raw: false });
    return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
  }
  const wb = XLSX.read(buf, { type: "array" });
  return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
}

/* Parse file MONEV (per-satker, aggregate per Kanwil) */
function aggregateMonev(rows) {
  const byKd = {};
  rows.forEach(row => {
    const kd = String(row.KDKANWIL || "").replace(/^'/,"").padStart(2,"0");
    if (!kd || kd === "00") return;
    if (!byKd[kd]) byKd[kd] = { rows: [], nmkanwil: row.NMKANWIL || "" };
    byKd[kd].rows.push(row);
  });

  const result = {};
  Object.entries(byKd).forEach(([kd, info]) => {
    const fields = [...ASPEK_FIELDS.kepatuhan, ...ASPEK_FIELDS.pelaporan, ...ASPEK_FIELDS.kendalaBelanja, ...ASPEK_FIELDS.permasalahan, "REKOMENDASI"];
    const agg = {};
    fields.forEach(f => {
      const vals = info.rows.map(r => r[f]).filter(v => !isEmpty(v));
      agg[f] = vals.length ? vals[0] : ""; // ambil yang pertama non-empty
    });
    // Ambil tanggal & nomor ND dari kolom TGL_SURAT / NO_SURAT (jika terisi)
    const tglSurat = info.rows.map(r => r.TGL_SURAT).find(v => !isEmpty(v));
    const noSurat = info.rows.map(r => r.NO_SURAT).find(v => !isEmpty(v));
    result[kd] = { ...agg, _tglSurat: tglSurat, _noSurat: noSurat, _nmkanwil: info.nmkanwil, _rawRows: info.rows };
  });
  return result;
}

/* Parse file IKHTISAR (1 row per Kanwil) */
function parseIkhtisar(rows) {
  const out = {};
  rows.forEach(row => {
    const kd = String(row.KDKANWIL || "").replace(/^'/,"").padStart(2,"0");
    if (!kd || kd === "00") return;
    out[kd] = {
      GAMBARAN_UMUM: row.GAMBARAN_UMUM || "",
      KESIMPULAN: row.KESIMPULAN || "",
      REKOMENDASI: row.REKOMENDASI || "",
      _nmkanwil: row.NMKANWIL || "",
    };
  });
  return out;
}

/* ============================================================
   FALLBACK IKHTISAR — saat Kanwil tidak mengisi GAMBARAN_UMUM /
   KESIMPULAN / REKOMENDASI di Excel Ikhtisar, kita rangkum dari
   Excel Monev (per-satker) sesuai aspek cluster.
   ============================================================ */
const TRIVIAL_RE = /^(tidak ada|tidak\s*ada|sesuai|nihil|ada|ok|tidak|-+|n\/?a)\.?$/i;

function isMeaningful(v) {
  if (isEmpty(v)) return false;
  const s = String(v).trim();
  if (s.length < 5) return false; // terlalu pendek
  if (TRIVIAL_RE.test(s)) return false;
  return true;
}

function collectAspectText(rows, fields) {
  const seen = new Set();
  const out = [];
  rows.forEach(row => {
    fields.forEach(f => {
      const v = String(row[f] || "").trim();
      if (!isMeaningful(v)) return;
      const key = v.toLowerCase().slice(0, 80);
      if (seen.has(key)) return;
      seen.add(key);
      out.push(v);
    });
  });
  return out;
}

function num(v) { const n = parseFloat(String(v).replace(/[^\d\.\-]/g, "")); return isNaN(n) ? 0 : n; }
function fmtRp(n) { return "Rp" + (n / 1e9).toFixed(2) + " miliar"; }
function fmtPct(a, b) { return b > 0 ? ((a/b)*100).toFixed(2) + "%" : "-"; }

function buildFallbackIkhtisar(monevRows, provinsi) {
  if (!monevRows || !monevRows.length) {
    return { GAMBARAN_UMUM: "", KESIMPULAN: "", REKOMENDASI: "", _fallback: true, _hasFallbackData: false };
  }
  // Hitung agregat numerik untuk Gambaran Umum
  const uniqSatker = new Set(monevRows.map(r => r.KDSATKER || r.NMSATKER)).size || monevRows.length;
  const totalPagu = monevRows.reduce((s, r) => s + num(r.PAGU_BELANJA), 0);
  const totalReal = monevRows.reduce((s, r) => s + num(r.REAL_BELANJA), 0);
  const totalTarget = monevRows.reduce((s, r) => s + num(r.TARGET), 0);
  const totalSetoran = monevRows.reduce((s, r) => s + num(r.SETORAN), 0);

  const gambaranUmum = `Pada Kanwil DJPb Provinsi ${provinsi} terdapat ${uniqSatker} satker pengelola PNBP dengan total pagu belanja PNBP sebesar ${fmtRp(totalPagu)}. Realisasi belanja PNBP mencapai ${fmtRp(totalReal)} (${fmtPct(totalReal, totalPagu)} dari pagu). Adapun realisasi penerimaan PNBP sebesar ${fmtRp(totalSetoran)} atau ${fmtPct(totalSetoran, totalTarget)} dari target PNBP sebesar ${fmtRp(totalTarget)}.`;

  // Kumpulkan teks per aspek
  const kep = collectAspectText(monevRows, ASPEK_FIELDS.kepatuhan);
  const pel = collectAspectText(monevRows, ASPEK_FIELDS.pelaporan);
  const ken = collectAspectText(monevRows, ASPEK_FIELDS.kendalaBelanja);
  const per = collectAspectText(monevRows, ASPEK_FIELDS.permasalahan);
  const rek = collectAspectText(monevRows, ASPEK_FIELDS.rekomendasi);

  const fmtList = (arr) => arr.map((s, i) => `${i+1}) ${s.replace(/\.\s*$/, "")}.`).join(" ");

  // Susun KESIMPULAN dengan marker aspek (splitter akan memecahnya kembali)
  const parts = [];
  if (kep.length) parts.push(`Aspek Kepatuhan Pemungutan dan Penyetoran: ${fmtList(kep)}`);
  if (pel.length) parts.push(`Aspek Pelaporan dan Penatausahaan: ${fmtList(pel)}`);
  if (ken.length) parts.push(`Aspek Kendala Pelaksanaan Belanja PNBP: ${fmtList(ken)}`);
  if (per.length) parts.push(`Aspek Permasalahan Penerimaan PNBP: ${fmtList(per)}`);
  const kesimpulan = parts.join(" ");

  return {
    GAMBARAN_UMUM: gambaranUmum,
    KESIMPULAN: kesimpulan,
    REKOMENDASI: rek.length ? fmtList(rek) : "",
    _fallback: true,
    _hasFallbackData: !!(kep.length || pel.length || ken.length || per.length || rek.length),
  };
}

/* ============================================================
   COMBINED ASPEK CHECK — cek Monev DULU, lalu Kesimpulan Ikhtisar
   "Satu isian jelas di satu sel sudah cukup untuk dianggap terpenuhi"
   ============================================================ */
function hasKesimpulanAspek(rec, aspekKey) {
  if (!rec.KESIMPULAN) return false;
  const split = splitKesimpulan(rec.KESIMPULAN);
  const text = (split[aspekKey] || "").trim();
  if (!text) return false;
  // Buang header "Aspek Xxx:" / "4) Aspek Xxx" — sisakan content
  const content = text.replace(/^[\s\d\)\.]*aspek\s+[\w\s]*?:?\s*/i, "").trim();
  return content.length >= 15 && !isEmpty(content);
}
function aspekTerisiCombined(rec, aspekKey) {
  if (aspekTerisi(rec, ASPEK_FIELDS[aspekKey])) return true;
  if (aspekKey === "rekomendasi") return !isEmpty(rec.REKOMENDASI);
  return hasKesimpulanAspek(rec, aspekKey);
}
/* Override hitungIndeksPemenuhan agar pakai combined check */
function hitungIndeksPemenuhanCombined(record) {
  const aspek = ["kepatuhan","pelaporan","kendalaBelanja","permasalahan"];
  const terisi = aspek.filter(a => aspekTerisiCombined(record, a));
  const rekomendasiTerisi = aspekTerisiCombined(record, "rekomendasi");
  const analisis = record.ANALISIS || "Komprehensif";
  if (terisi.length === 4 && rekomendasiTerisi && analisis === "Komprehensif") return 5;
  if (terisi.length === 4 && rekomendasiTerisi && analisis === "Cukup Komprehensif") return 4.1;
  if (terisi.length === 4 && analisis === "Kurang Komprehensif") return 3.5;
  if (terisi.length >= 2 && terisi.length < 4) return 3;
  if (terisi.length === 1) return 2;
  return 1;
}

/* ============================================================
   PDF BODY PARSER — anchor-based, toleran ke variasi format ND.
   Cari posisi keyword "aspek Xxx" / "direkomendasikan" di body,
   teks antara dua anchor jadi konten section tersebut.
   ============================================================ */
function trimClosing(text) {
  if (!text) return "";
  const closingRe = /\b(Demikian\s+(?:kami\s+)?(?:sampaikan|disampaikan)|Demikian\s+disampaikan|atas\s+perhatian(?:nya)?\s+(?:kami|Bapak)\s+(?:ucapkan|sampaikan)|Dalam\s+rangka\s+(?:menjaga|mempertahankan)|Ditandatangani\s+secara\s+elektronik|Tembusan\s*:)/i;
  const m = text.match(closingRe);
  return m ? text.slice(0, m.index).trim() : text.trim();
}

function extractNdBody(text) {
  // Start: setelah label Tanggal di KOP
  const tglRe = /Tanggal\s*:?\s*\d{1,2}\s+(?:Januari|Februari|Maret|April|Mei|Juni|Juli|Agustus|September|Oktober|November|Desember)\s+\d{4}/i;
  const tglMatch = text.match(tglRe);
  let body = tglMatch ? text.slice(tglMatch.index + tglMatch[0].length) : text;

  // End: cari penanda akhir ND / awal lampiran
  body = trimClosing(body);

  // Kalau ada "LAMPIRAN" standalone, potong di situ juga
  const lampMatch = body.match(/\n\s*LAMPIRAN\s*[\n$]|\s+LAMPIRAN\s+(?:Surat|Laporan|Kepala|Nomor)/);
  if (lampMatch) body = body.slice(0, lampMatch.index).trim();

  // Kalau ada kemunculan KEDUA "KEMENTERIAN KEUANGAN" = ada KOP lampiran
  const kops = [...body.matchAll(/KEMENTERIAN\s+KEUANGAN\s+REPUBLIK\s+INDONESIA/gi)];
  if (kops.length > 0) body = body.slice(0, kops[0].index).trim();

  return body;
}

// Bersihkan preamble "Sehubungan dengan... sebagai berikut:" yang tidak relevan
function cleanGambaran(text) {
  if (!text) return "";
  let cleaned = text.replace(
    /^[\s\S]*?(?:sebagai\s+berikut|kami\s+sampaikan\s+(?:hal[-\s]hal|sebagai|sebagai\s+berikut)|disampaikan\s+sebagai\s+berikut|adalah\s+sebagai\s+berikut)\s*[:\.]?\s*/i,
    ''
  ).trim();
  if (cleaned.length < 80) cleaned = text.trim();
  // Hanya kembalikan kalau ada indikator angka finansial/satker
  const hasIndicators = /\b(?:satker|satuan\s+kerja|pagu|realisasi|target|Rp\s*[\d.,]+|miliar|triliun|\d+\s*%)/i.test(cleaned);
  return hasIndicators ? cleaned : "";
}

function parsePdfBody(text) {
  if (!text) return null;
  const body = extractNdBody(text);
  if (!body || body.length < 80) return null;

  // Pola anchor — expanded per user request, handle variasi istilah ND + Excel
  const anchorPatterns = [
    { key: 'kepatuhan',      re: /(?:aspek\s+)?(?:kepatuhan\s+pemungutan(?:\s+dan\s+penyetoran)?|kesesuaian\s+pembayaran\/?\s*penyetoran\s+PNBP|kepatuhan\s+(?:dan\s+)?penyetoran)/gi },
    { key: 'pelaporan',      re: /(?:aspek\s+)?(?:pelaporan\s+dan\s+penatausahaan|pelaporan\s+(?:serta\s+)?penatausahaan)/gi },
    { key: 'kendalaBelanja', re: /(?:aspek\s+)?(?:kendala\s+pelaksanaan\s+(?:belanja|anggaran)(?:\s+PNBP)?|(?:aspek\s+)?belanja\s+PNBP|kualitas\s+proyeksi\s+dan\s+realisasi\s+belanja|kendala\s+dalam\s+pelaksanaan\s+belanja|pelaksanaan\s+(?:belanja|anggaran)\s+PNBP|proyeksi\s+(?:penerimaan\s+dan\s+)?belanja\s+PNBP)|kendala\/?\s*permasalahan\s+pengelolaan/gi },
    { key: 'permasalahan',   re: /(?:aspek\s+)?(?:permasalahan\s+penerimaan(?:\s+PNBP)?|(?:aspek\s+)?penerimaan\s+PNBP|kualitas\s+proyeksi\s+dan\s+setoran\s+penerimaan|kendala\s+dalam\s+capaian\s+setoran)/gi },
    { key: 'rekomendasi',    re: /(?:^|[\s\.])(?:dapat\s+)?(?:satker\s+)?direkomendasikan|(?:^|[\s\.])rekomendasi(?:\s+(?:sebagai|kepada|pengelolaan|bagi))?\s*[:\s]|memberikan\s+rekomendasi\s+sebagai/gi },
  ];

  // Kumpulkan semua anchor + posisinya
  const anchors = [];
  for (const ap of anchorPatterns) {
    ap.re.lastIndex = 0;
    let m;
    while ((m = ap.re.exec(body)) !== null) {
      anchors.push({ key: ap.key, idx: m.index });
    }
  }
  anchors.sort((a, b) => a.idx - b.idx);

  // Backtrack: jika anchor jatuh di tengah kalimat (mis. "4. Hasil monev ... pada aspek
  // Kepatuhan..."), geser posisi anchor ke awal poin bernomor terdekat sebelumnya,
  // supaya seluruh poin tersebut masuk ke section aspek, tidak ada fragmen menggantung di Gambaran.
  const pointStarts = [];
  { const re2 = /(?:^|\n|\s)(\d{1,2}\.\s+)(?=[A-Z])/g; let pm; while ((pm = re2.exec(body)) !== null) pointStarts.push(pm.index + pm[0].length - pm[1].length); }
  function backtrackToPointStart(idx, minIdx) {
    let best = -1;
    for (const ps of pointStarts) {
      if (ps <= idx && ps > minIdx && idx - ps < 400) best = Math.max(best, ps);
    }
    return best > 0 ? best : idx;
  }
  for (let i = 0; i < anchors.length; i++) {
    const minIdx = i > 0 ? anchors[i-1].idx : 0;
    anchors[i].idx = backtrackToPointStart(anchors[i].idx, minIdx);
  }
  anchors.sort((a, b) => a.idx - b.idx);

  // Cluster filter: kalau 3+ anchor aspek menumpuk dalam ~300 char,
  // itu kemungkinan "daftar isi" (mis. Papua Barat: "a. Gambaran; b. Aspek X; c. Aspek Y; ...").
  // Buang semua anchor di area cluster — yang real biasanya muncul di paragraf setelahnya.
  const aspekKeys = ['kepatuhan', 'pelaporan', 'kendalaBelanja', 'permasalahan'];
  const aspekAnchors = anchors.filter(a => aspekKeys.includes(a.key));
  let clusterEnd = -1;
  for (let i = 0; i + 2 < aspekAnchors.length; i++) {
    if (aspekAnchors[i+2].idx - aspekAnchors[i].idx < 300) {
      clusterEnd = aspekAnchors[i+2].idx + 80;
      // Perluas cluster kalau anchor berikutnya juga dekat
      for (let j = i + 3; j < aspekAnchors.length; j++) {
        if (aspekAnchors[j].idx - aspekAnchors[j-1].idx < 200) clusterEnd = aspekAnchors[j].idx + 80;
        else break;
      }
      break;
    }
  }
  const filteredAnchors = clusterEnd > 0
    ? anchors.filter(a => a.idx > clusterEnd || a.key === 'rekomendasi' && a.idx > clusterEnd)
    : anchors;

  // Gambaran Umum = teks dari awal sampai anchor pertama
  const gambaranEnd = filteredAnchors.length > 0 ? filteredAnchors[0].idx : body.length;
  const gambaranUmum = cleanGambaran(body.slice(0, gambaranEnd));

  // Tiap section = teks dari anchor sekarang sampai anchor berikutnya
  const sections = { kepatuhan: [], pelaporan: [], kendalaBelanja: [], permasalahan: [], rekomendasi: [] };
  for (let i = 0; i < filteredAnchors.length; i++) {
    const a = filteredAnchors[i];
    const end = i + 1 < filteredAnchors.length ? filteredAnchors[i+1].idx : body.length;
    const content = body.slice(a.idx, end).replace(/\s+/g, ' ').trim();
    if (content.length > 30) sections[a.key].push(content);
  }

  // "Secara umum" catch-all: kalau tidak ada aspek sections tapi body punya frasa
  // "secara umum/keseluruhan... sesuai... regulasi", isi semua aspek dengan body
  const hasAnySections = aspekKeys.some(k => sections[k].length > 0);
  if (!hasAnySections) {
    const bodyFlat = body.replace(/\s+/g, ' ');
    if (/secara\s+(?:umum|keseluruhan)\s+[\s\S]{0,300}(?:sesuai\s+(?:dengan\s+)?(?:kebijakan|regulasi|peraturan|ketentuan)|telah\s+(?:berjalan|dilaksanakan|terlaksana)|tidak\s+(?:ada\s+)?(?:kendala|permasalahan))/i.test(bodyFlat)) {
      const catchAllText = bodyFlat.slice(0, 2000).trim();
      aspekKeys.forEach(k => sections[k].push(catchAllText));
    }
  }

  const join = arr => arr.join(" ").replace(/\s+/g, ' ').trim();
  // Hindari duplikasi label "Aspek Xxx: ... aspek Xxx ..." — kalau konten section
  // sudah memuat frasa aspek tersebut di ~80 char pertama, jangan tambah prefix lagi.
  const labelOrJoin = (label, contentArr, phraseRe) => {
    if (!contentArr.length) return "";
    const content = join(contentArr);
    if (phraseRe.test(content.slice(0, 100))) return content;
    return label + content;
  };
  return {
    GAMBARAN_UMUM: gambaranUmum,
    KESIMPULAN_PARTS: {
      kepatuhan: labelOrJoin("Aspek Kepatuhan Pemungutan dan Penyetoran: ", sections.kepatuhan, /aspek\s+kepatuhan/i),
      pelaporan: labelOrJoin("Aspek Pelaporan dan Penatausahaan: ", sections.pelaporan, /aspek\s+pelaporan/i),
      kendalaBelanja: labelOrJoin("Aspek Kendala Pelaksanaan Belanja PNBP: ", sections.kendalaBelanja, /aspek\s+(?:kendala|pelaksanaan|belanja|proyeksi)/i),
      permasalahan: labelOrJoin("Aspek Permasalahan Penerimaan PNBP: ", sections.permasalahan, /aspek\s+(?:permasalahan|penerimaan)/i),
    },
    REKOMENDASI: join(sections.rekomendasi),
  };
}

/* Smart fallback — kombinasi PDF body + Monev agregat */
function buildSmartFallback(monevRows, pdfFullText, kanwilName) {
  let gambaranUmum = "", kesimpulan = "", rekomendasi = "";
  const sources = [];

  // Priority 1: PDF body parsing
  if (pdfFullText) {
    const parsed = parsePdfBody(pdfFullText);
    if (parsed) {
      if (parsed.GAMBARAN_UMUM) gambaranUmum = parsed.GAMBARAN_UMUM;
      const aspekParts = Object.values(parsed.KESIMPULAN_PARTS).filter(Boolean);
      if (aspekParts.length) kesimpulan = aspekParts.join(" ");
      if (parsed.REKOMENDASI) rekomendasi = parsed.REKOMENDASI;
      if (gambaranUmum || kesimpulan || rekomendasi) sources.push("Nota Dinas");
    }
  }

  // Priority 2: Excel Monev (mengisi yang masih kosong)
  if (monevRows && monevRows.length) {
    const mf = buildFallbackIkhtisar(monevRows, kanwilName);
    if (!gambaranUmum && mf.GAMBARAN_UMUM) gambaranUmum = mf.GAMBARAN_UMUM;
    if (!kesimpulan && mf.KESIMPULAN) kesimpulan = mf.KESIMPULAN;
    if (!rekomendasi && mf.REKOMENDASI) rekomendasi = mf.REKOMENDASI;
    if (mf._hasFallbackData && !sources.includes("Nota Dinas")) sources.push("Excel Monev");
    else if (mf._hasFallbackData && sources.length) sources.push("Excel Monev"); // both
  }

  let sourceLabel = "kosong";
  if (sources.length === 2) sourceLabel = "Excel Monev & Nota Dinas";
  else if (sources.length === 1) sourceLabel = sources[0] === "Nota Dinas" ? "Nota Dinas" : "Excel Monev";

  return {
    GAMBARAN_UMUM: gambaranUmum,
    KESIMPULAN: kesimpulan,
    REKOMENDASI: rekomendasi,
    _fallback: true,
    _fallbackSource: sourceLabel,
    _hasFallbackData: !!(gambaranUmum || kesimpulan || rekomendasi),
  };
}

/* ============================================================
   MAIN PROCESSOR — gabungkan PDF + Excel Monev + Excel Ikhtisar
   ============================================================ */
async function processFiles(pdfFiles, monevFile, ikhFile, batasWaktu) {
  const status = (msg) => { const el = document.getElementById("uploadProgress"); if (el) el.textContent = msg; };

  // 1. PDFs
  status("Membaca PDF Nota Dinas...");
  const ndByProvinsi = {};
  const pdfFullByProvinsi = {};
  for (const f of pdfFiles) {
    try {
      const headerText = await extractPdfHeaderText(f);
      const info = parseNdInfo(headerText, f.name);
      const k = info.kanwilHint ? findKanwilByName(info.kanwilHint) : null;
      if (k) {
        ndByProvinsi[k.provinsi] = { nomor: info.nomor, tgl: info.tgl, file: f.name };
        // Simpan teks lengkap untuk fallback Ikhtisar
        try { pdfFullByProvinsi[k.provinsi] = await extractPdfFullText(f); }
        catch(e) { pdfFullByProvinsi[k.provinsi] = headerText; }
        console.log(`[PDF] ${f.name} → ${k.provinsi} | ND: ${info.nomor || "(tidak terdeteksi)"} | Tgl: ${info.tgl || "(tidak terdeteksi)"}`);
      } else {
        console.warn(`[PDF] ${f.name} → Kanwil TIDAK terdeteksi. Periksa apakah ada frasa "Provinsi ..." di KOP.`);
      }
    } catch (e) { console.error("Gagal baca PDF", f.name, e); }
  }

  // 2. Excel Monev
  status("Membaca file Monev PNBP...");
  let monevByKd = {};
  try {
    const rows = await readSheet(monevFile);
    monevByKd = aggregateMonev(rows);
  } catch (e) { console.error("Gagal baca Monev", e); }

  // 3. Excel Ikhtisar
  status("Membaca file Ikhtisar/Kesimpulan...");
  let ikhByKd = {};
  try {
    const rows = await readSheet(ikhFile);
    ikhByKd = parseIkhtisar(rows);
  } catch (e) { console.error("Gagal baca Ikhtisar", e); }

  // 4. Merge — iterate sesuai urutan KANWIL_MAPPING (urutan dikunci)
  status("Menyusun rekap penilaian...");
  const merged = KANWIL_MAPPING.map((k, i) => {
    const monev = monevByKd[k.kd] || {};
    const ikhRaw = ikhByKd[k.kd] || {};
    const ndPdf = ndByProvinsi[k.provinsi] || {};

    // Cek apakah Ikhtisar Excel kosong ATAU parsial → supplement dari PDF/Monev
    const ikhKosong = isEmpty(ikhRaw.GAMBARAN_UMUM) && isEmpty(ikhRaw.KESIMPULAN) && isEmpty(ikhRaw.REKOMENDASI);
    const pdfFullText = pdfFullByProvinsi[k.provinsi];

    // Cek apakah Excel parsial: ada isian tapi ada kolom kosong atau kesimpulan pendek per aspek
    const spRaw = splitKesimpulan(ikhRaw.KESIMPULAN || "");
    const aspekKeys = ['kepatuhan', 'pelaporan', 'kendalaBelanja', 'permasalahan'];
    const filledAspek = aspekKeys.filter(a => spRaw[a] && spRaw[a].length > 30).length;
    const ikhParsial = !ikhKosong && (filledAspek < 4 || isEmpty(ikhRaw.GAMBARAN_UMUM) || isEmpty(ikhRaw.REKOMENDASI));

    let ikh;
    let ikhFallback = false;
    if (ikhKosong) {
      // Semua kosong → full fallback
      const canFallback = !!(monev._rawRows || pdfFullText);
      ikhFallback = canFallback;
      ikh = canFallback
        ? buildSmartFallback(monev._rawRows, pdfFullText, k.provinsi)
        : { ...ikhRaw, _fallback: false, _fallbackSource: null };
    } else if (ikhParsial && pdfFullText) {
      // Parsial → supplement yang kosong dari PDF
      const parsed = parsePdfBody(pdfFullText);
      let supplemented = false;
      const merged = { ...ikhRaw, _fallback: false, _fallbackSource: null };
      if (parsed) {
        if (isEmpty(ikhRaw.GAMBARAN_UMUM) && parsed.GAMBARAN_UMUM) { merged.GAMBARAN_UMUM = parsed.GAMBARAN_UMUM; supplemented = true; }
        if (isEmpty(ikhRaw.REKOMENDASI) && parsed.REKOMENDASI) { merged.REKOMENDASI = parsed.REKOMENDASI; supplemented = true; }
        // Supplement per aspek yang kosong
        const pdfAspekParts = parsed.KESIMPULAN_PARTS || {};
        const pdfKesimpulanParts = [];
        aspekKeys.forEach(a => {
          if ((!spRaw[a] || spRaw[a].length <= 30) && pdfAspekParts[a]) {
            pdfKesimpulanParts.push(pdfAspekParts[a]);
            supplemented = true;
          }
        });
        if (pdfKesimpulanParts.length > 0) {
          merged.KESIMPULAN = (merged.KESIMPULAN || "") + " " + pdfKesimpulanParts.join(" ");
          merged.KESIMPULAN = merged.KESIMPULAN.trim();
        }
      }
      if (supplemented) {
        merged._fallback = true;
        merged._fallbackSource = "Excel Ikhtisar & Nota Dinas";
        ikhFallback = true;
      }
      ikh = merged;
    } else {
      ikh = { ...ikhRaw, _fallback: false, _fallbackSource: null };
    }

    const rec = {
      no: i + 1,
      kanwilProvinsi: k.provinsi,
      kdKanwil: k.kd,
      // Aspek (dari Monev Excel — agregasi per Kanwil)
      ...Object.fromEntries(
        [...ASPEK_FIELDS.kepatuhan, ...ASPEK_FIELDS.pelaporan, ...ASPEK_FIELDS.kendalaBelanja, ...ASPEK_FIELDS.permasalahan]
        .map(f => [f, monev[f] || ""])
      ),
      // Rekomendasi: prioritas dari Ikhtisar, fallback ke Monev
      REKOMENDASI: ikh.REKOMENDASI || monev.REKOMENDASI || "",
      // Narrasi dari Ikhtisar (asli atau fallback)
      GAMBARAN_UMUM: ikh.GAMBARAN_UMUM || "",
      KESIMPULAN: ikh.KESIMPULAN || "",
      _fallbackIkhtisar: ikhFallback,
      _fallbackSource: ikh._fallbackSource || null,
      // Tanggal & Nomor ND: prioritas dari PDF, fallback ke Monev Excel HANYA jika prefix-nya ND
      tglPenyampaian: ndPdf.tgl || (monev._tglSurat && /^ND-/i.test(String(monev._noSurat||"")) ? new Date(monev._tglSurat).toISOString().slice(0,10) : ""),
      nomorND: ndPdf.nomor || (monev._noSurat && /^ND-/i.test(String(monev._noSurat)) ? monev._noSurat : ""),
      batasWaktu,
      ANALISIS: "Komprehensif",
      _hasData: !!(monev._nmkanwil || ikhRaw._nmkanwil || ndPdf.nomor),
    };
    return recompute(rec, batasWaktu);
  });

  return merged;
}

const esc = (s) => String(s ?? "").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m])).replace(/\n/g, "<br>");

function applyTextFormat(ws) {
  const ref = XLSX.utils.decode_range(ws["!ref"]);
  for (let R = ref.s.r; R <= ref.e.r; R++) {
    for (let C = ref.s.c; C <= ref.e.c; C++) {
      const addr = XLSX.utils.encode_cell({ r: R, c: C });
      const cell = ws[addr];
      if (cell && cell.v !== undefined && cell.v !== null) { cell.t = "s"; cell.v = String(cell.v); }
    }
  }
}

/* Helper generic untuk export Word (.doc) — bisa portrait/landscape */
function buildWordDoc(title, orientation, theadHtml, tbodyHtml, colgroupHtml, extraColCss) {
  const isLandscape = orientation === "landscape";
  const pageSize = isLandscape ? "29.7cm 21cm" : "21cm 29.7cm";
  const orient = isLandscape ? "landscape" : "portrait";
  return `<!DOCTYPE html>
<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="utf-8">
<!--[if gte mso 9]>
<xml>
<w:WordDocument>
<w:View>Print</w:View>
<w:Zoom>90</w:Zoom>
<w:DoNotOptimizeForBrowser/>
</w:WordDocument>
</xml>
<![endif]-->
<style>
  @page Section1 {
    size: ${pageSize};
    mso-page-orientation: ${orient};
    margin: 1.27cm 1.27cm 1.27cm 1.27cm;
  }
  div.Section1 { page: Section1; }
  body { font-family: Calibri, Arial, sans-serif; font-size: 9pt; }
  h2 { text-align: center; color: #1e3a8a; font-size: 13pt; }
  table { border-collapse: collapse; width: 100%; table-layout: fixed; }
  th, td { border: 1px solid #94a3b8; padding: 5px; vertical-align: top; word-wrap: break-word; }
  th { background: #1e3a8a; color: #ffffff; font-weight: bold; text-align: center; font-size: 9pt; }
  td { font-size: 8.5pt; line-height: 1.35; }
  ${extraColCss || ""}
</style>
</head>
<body>
<div class="Section1">
<h2>${esc(title)}</h2>
<table>
  ${colgroupHtml || ""}
  <thead>${theadHtml}</thead>
  <tbody>${tbodyHtml}</tbody>
</table>
</div>
</body>
</html>`;
}
function downloadWordDoc(html, filename) {
  const blob = new Blob(["\ufeff", html], { type: "application/msword" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

      <span class="flex-1 text-left">${m.label}</span>
      ${active===m.id ? '<i data-lucide="chevron-right" class="w-[14px] h-[14px]"></i>' : ''}
    </button>
  `).join("");
  nav.querySelectorAll("button").forEach(btn => btn.addEventListener("click", () => { active = btn.dataset.menu; render(); }));
}

    if (!files.length) { info.classList.add("hidden"); list.classList.add("hidden"); return; }
    info.innerHTML = `<span class="inline-flex items-center gap-1 text-emerald-700 font-medium"><i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i> ${files.length} file PDF terpilih</span>`;

  });

    document.getElementById(`file_${k}`).addEventListener("change", e => {
      const info = document.getElementById(`file_${k}_info`);
      const f = e.target.files?.[0];
      if (f) { info.textContent = "✓ " + f.name; info.classList.remove("hidden"); }
      else info.classList.add("hidden");

  });

  const showStatus = (msg, type="ok") => {
    const el = document.getElementById("uploadStatus");
    const colors = { ok:"bg-emerald-50 text-emerald-800 border-emerald-200", warn:"bg-amber-50 text-amber-800 border-amber-200", info:"bg-blue-50 text-blue-800 border-blue-200" };
    el.className = `mt-4 p-3 rounded-md text-sm border ${colors[type]}`;
    el.innerHTML = msg;
    el.classList.remove("hidden");
  };

  document.getElementById("btnProses").onclick = async () => {
    const ndFiles = Array.from(document.getElementById("file_nd").files || []);
    const monevFile = document.getElementById("file_monev").files[0];
    const ikhFile = document.getElementById("file_ikh").files[0];
    const newBatas = document.getElementById("f_batas").value || batasWaktu;

    const missing = [];
    if (!ndFiles.length) missing.push("Nota Dinas (PDF)");
    if (!monevFile) missing.push("File Monev PNBP");
    if (!ikhFile) missing.push("File Ikhtisar");
    if (missing.length) {
      showStatus(`<strong>File belum lengkap.</strong> Mohon unggah: ${missing.join(", ")}.`, "warn");
      return;
    }

    const btn = document.getElementById("btnProses");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Memproses...';
    showStatus(`<strong>Sedang memproses...</strong> <span id="uploadProgress" class="ml-2 text-blue-700"></span>`, "info");

    try {
      batasWaktu = newBatas;
      const result = await processFiles(ndFiles, monevFile, ikhFile, batasWaktu);
      DATA = result;
      dataLoaded = true;
      const stats = {
        nd: result.filter(d => d.nomorND).length,
        aspek: result.filter(d => aspekTerisi(d, ASPEK_FIELDS.kepatuhan) || aspekTerisi(d, ASPEK_FIELDS.pelaporan)).length,
        ikh: result.filter(d => d.GAMBARAN_UMUM || d.KESIMPULAN).length,
      };
      showStatus(`<strong>Proses penilaian selesai.</strong><br>
        • ${stats.nd} Nota Dinas berhasil dibaca (Nomor ND & tanggal terdeteksi)<br>
        • ${stats.aspek} Kanwil memiliki data aspek monev<br>
        • ${stats.ikh} Kanwil memiliki Gambaran Umum/Kesimpulan<br>
        Buka menu laporan di samping untuk melihat hasil.`, "ok");
    } catch (err) {
      console.error(err);
      showStatus(`<strong>Gagal memproses:</strong> ${esc(err.message || err)}. Periksa format file dan coba lagi.`, "warn");
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i data-lucide="check-circle-2" class="w-4 h-4"></i> Proses Penilaian';
      lucide.createIcons();
    }
  };
  lucide.createIcons();
}

/* ============================================================
   FILTER KANWIL — dropdown checklist multi-select per menu
   ============================================================ */
function kanwilNames() { return KANWIL_MAPPING.map(k => k.provinsi); }
const filterState = {
  kualitas: new Set(kanwilNames()),
  ketepatan: new Set(kanwilNames()),
  pemenuhan: new Set(kanwilNames()),
  ikhtisar: new Set(kanwilNames()),
};
const filterPanelOpen = { kualitas: false, ketepatan: false, pemenuhan: false, ikhtisar: false };

function toggleKanwilFilter(menuKey) {
  filterPanelOpen[menuKey] = !filterPanelOpen[menuKey];
  renderActive();
}
function setAllKanwilFilter(menuKey, val) {
  filterState[menuKey] = val ? new Set(kanwilNames()) : new Set();
  renderActive();
}
function toggleKanwilOne(menuKey, name, checked) {
  const set = filterState[menuKey];
  if (checked) set.add(name); else set.delete(name);
  renderActive();
}
function renderActive() {
  if (active === "kualitas") renderKualitas();
  else if (active === "ketepatan") renderKetepatan();
  else if (active === "pemenuhan") renderPemenuhan();
  else if (active === "ikhtisar") renderIkhtisar();
}
// Tutup dropdown saat klik di luar
document.addEventListener("click", e => {
  // Jika target sudah lepas dari DOM (akibat re-render dari klik tombol toggle), abaikan
  if (!document.body.contains(e.target)) return;
  let changed = false;
  Object.keys(filterPanelOpen).forEach(k => {
    if (!filterPanelOpen[k]) return;
    const wrap = document.getElementById(`kanwilFilterWrap-${k}`);
    if (wrap && !wrap.contains(e.target)) { filterPanelOpen[k] = false; changed = true; }
  });
  if (changed) renderActive();
});

function kanwilFilterDropdown(menuKey) {
  const all = kanwilNames();
  const selected = filterState[menuKey];
  const allSelected = selected.size === all.length;
  const label = allSelected ? "Semua Kanwil" : (selected.size === 0 ? "Tidak ada Kanwil dipilih" : `${selected.size} Kanwil dipilih`);
  const open = filterPanelOpen[menuKey];
  return `
    <div class="relative" id="kanwilFilterWrap-${menuKey}">
      <button onclick="toggleKanwilFilter('${menuKey}')" class="inline-flex items-center gap-2 px-3 py-2 border border-slate-300 rounded-md text-sm bg-white hover:bg-slate-50 min-w-[180px] justify-between">
        <span class="flex items-center gap-2"><i data-lucide="filter" class="w-4 h-4 text-slate-400"></i> ${esc(label)}</span>
        <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i>
      </button>
      <div class="absolute z-20 mt-1 w-72 max-h-80 overflow-y-auto bg-white border border-slate-200 rounded-md shadow-lg p-2 ${open ? '' : 'hidden'}">
        <div class="flex gap-3 mb-2 pb-2 border-b border-slate-100">
          <button onclick="setAllKanwilFilter('${menuKey}', true)" class="text-xs text-blue-600 hover:underline">Pilih Semua</button>
          <button onclick="setAllKanwilFilter('${menuKey}', false)" class="text-xs text-blue-600 hover:underline">Hapus Semua</button>
        </div>
        ${all.map(name => `
          <label class="flex items-center gap-2 py-1 px-1 text-sm cursor-pointer hover:bg-slate-50 rounded">
            <input type="checkbox" ${selected.has(name) ? "checked" : ""} onchange="toggleKanwilOne('${menuKey}', '${esc(name).replace(/'/g, "\\'")}', this.checked)" />
            <span>${esc(name)}</span>
          </label>
        `).join("")}
      </div>
    </div>
  `;
}

function reportHeader(title, menuKey, extraButtonsHtml) {
  return `
    <div class="mb-4">
      <div class="title-banner"><h2>${title}</h2></div>
      <div class="flex items-center justify-between gap-3 py-3 px-1">
        ${kanwilFilterDropdown(menuKey)}
        <div class="flex items-center gap-2">
          ${extraButtonsHtml || ""}
          <button id="btnExport" class="inline-flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium bg-emerald-600 hover:bg-emerald-700 text-white">
            <i data-lucide="file-spreadsheet" class="w-4 h-4"></i> Export Excel

        </div>
      </div>
    </div>
  `;
}

function ikhtisarEmptyFlags(d) {
  const sp = splitKesimpulan(d.KESIMPULAN);
  return {
    gambaran: isEmpty(d.GAMBARAN_UMUM),
    kepatuhan: isEmpty(sp.kepatuhan),
    pelaporan: isEmpty(sp.pelaporan),
    kendalaBelanja: isEmpty(sp.kendalaBelanja),
    permasalahan: isEmpty(sp.permasalahan),
    rekomendasi: isEmpty(d.REKOMENDASI),
  };
}
function hasEmptyIkhtisarColumn(d) {
  return Object.values(ikhtisarEmptyFlags(d)).some(Boolean);
}

  const toggle = document.getElementById("onlyFallbackToggle");
  if (toggle) toggle.addEventListener("change", e => { onlyFallback = e.target.checked; renderIkhtisar(); });
  bindReportControls(exportIkhtisar);

/* ============================================================
   AI RAPIKAN — panggil Anthropic API untuk rapikan teks per baris
   ============================================================ */
/* ============================================================
   AI RAPIKAN — fungsi inti (dipakai single-row & batch-all)
   Mengembalikan true jika sukses, false jika gagal/skip.
   ============================================================ */
async function aiCleanupCore(idx, apiKey) {
  const d = DATA[idx];
  if (!d) return false;

  const sp = splitKesimpulan(d.KESIMPULAN);
  const fields = {
    gambaran_umum: d.GAMBARAN_UMUM || "",
    kepatuhan: sp.kepatuhan || "",
    pelaporan: sp.pelaporan || "",
    kendala_belanja: sp.kendalaBelanja || "",
    permasalahan: sp.permasalahan || "",
    rekomendasi: d.REKOMENDASI || "",
  };

  // Skip jika semua kosong
  const hasContent = Object.values(fields).some(v => v && v !== "-" && v.length > 5);
  if (!hasContent) return "skip";

  const systemPrompt = `Kamu adalah editor teks bahasa Indonesia resmi pemerintah (Kementerian Keuangan), tugasnya merapikan Ikhtisar Laporan Monev PNBP Kanwil ${esc(d.kanwilProvinsi)}.

ATURAN UMUM (untuk semua field):
- Perbaiki typo, ejaan, spasi, tanda baca, huruf kapital.
- JANGAN tambah informasi baru yang tidak ada di teks asli.
- Jika ada daftar/poin yang digabung jadi satu paragraf, pisahkan jadi format bernomor (a. xxx, b. xxx, c. xxx) dengan baris baru di antaranya.

ATURAN KHUSUS field "gambaran_umum" — RESTRUKTURISASI menjadi PERSIS 3 paragraf pendek berikut (pisahkan dengan baris baru kosong), HANYA jika informasinya tersedia di teks asli:
1) Profil jumlah satker yang memiliki pagu belanja PNBP, dirinci MP PNBP Terpusat vs Tidak Terpusat.
2) Alokasi pagu belanja PNBP dan realisasinya (nominal + persentase).
3) Realisasi penerimaan PNBP dibanding target (nominal + persentase).
BUANG kalimat/poin lain di Gambaran Umum yang bercerita tentang monev pada satker tertentu (misal "Pada periode triwulan II ... telah melaksanakan monitoring dan evaluasi pada satker XXX ..." atau kalimat yang menjadi pembuka aspek seperti "Hasil monev pengelolaan PNBP satker XXX pada aspek ..."), karena itu sudah dibahas di kolom Aspek.
Contoh format hasil (gunakan gaya kalimat ini, sesuaikan angka dan nama provinsi dengan data asli):
"Pada Kanwil DJPb Provinsi Jambi terdapat 96 Satker yang memiliki pagu belanja PNBP, terdiri atas 83 Satker dengan MP PNBP Tidak Terpusat dan 13 Satker dengan MP PNBP Terpusat.\\n\\nAlokasi pagu belanja PNBP hingga Semester I tahun 2025 adalah sebesar Rp235,66 miliar, dengan realisasi mencapai Rp48,79 miliar (20,7%).\\n\\nAdapun realisasi penerimaan PNBP (PNBP Fungsional dan PNBP Umum) di Provinsi Jambi pada semester I TA 2025 adalah sebesar Rp168,47 miliar atau 120% dari target PNBP sebesar Rp140,38 miliar."
Jika salah satu dari 3 informasi di atas memang tidak ada di teks asli, lewati paragraf itu (jangan mengada-ada angka).

ATURAN KHUSUS field aspek (kepatuhan/pelaporan/kendala_belanja/permasalahan):
- Jika konten diawali kalimat pembuka yang menggantung/tidak relevan (misal sisa kalimat "Hasil monev pengelolaan PNBP satker XXX pada" tanpa lanjutan jelas, atau label aspek yang berulang dua kali seperti "Aspek Kepatuhan...: Aspek Kepatuhan..."), buang bagian pembuka yang berulang/menggantung tersebut dan mulai langsung dari isi substantifnya.

Balas HANYA dengan satu JSON object valid (tanpa backtick/markdown, tanpa teks lain) dengan key persis:
{"gambaran_umum":"...","kepatuhan":"...","pelaporan":"...","kendala_belanja":"...","permasalahan":"...","rekomendasi":"..."}

PENTING — aturan JSON:
- Setiap baris baru DI DALAM string HARUS ditulis sebagai karakter escape "\\n" (backslash-n), JANGAN newline literal.
- Pastikan seluruh output adalah JSON valid yang bisa di-parse, satu baris, tidak terpotong.
- Jika suatu field isinya "-" atau kosong, kembalikan "-".`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 8000,
      system: systemPrompt,
      messages: [
        { role: "user", content: JSON.stringify(fields) },
      ],
    }),
  });
  if (!response.ok) {
    const errBody = await response.json().catch(() => ({}));
    const msg = errBody?.error?.message || `HTTP ${response.status}`;
    throw new Error(msg);
  }
  const data = await response.json();
  let text = (data.content || []).map(b => b.text || "").join("");
  let clean = text.replace(/```json|```/g, "").trim();
  const firstBrace = clean.indexOf("{");
  const lastBrace = clean.lastIndexOf("}");
  if (firstBrace >= 0 && lastBrace > firstBrace) {
    clean = clean.slice(firstBrace, lastBrace + 1);
  }
  // Sanitasi: ganti newline/tab literal di dalam string JSON jadi escape \n / \t
  let sanitized = "";
  let inString = false;
  let escapeNext = false;
  for (let i = 0; i < clean.length; i++) {
    const ch = clean[i];
    if (escapeNext) { sanitized += ch; escapeNext = false; continue; }
    if (ch === "\\") { sanitized += ch; escapeNext = true; continue; }
    if (ch === '"') { inString = !inString; sanitized += ch; continue; }
    if (inString && ch === "\n") { sanitized += "\\n"; continue; }
    if (inString && ch === "\r") { continue; }
    if (inString && ch === "\t") { sanitized += "\\t"; continue; }
    sanitized += ch;
  }
  const parsed = JSON.parse(sanitized);

  // Update DATA
  if (parsed.gambaran_umum && parsed.gambaran_umum !== "-") d.GAMBARAN_UMUM = parsed.gambaran_umum;
  const parts = [];
  if (parsed.kepatuhan && parsed.kepatuhan !== "-") parts.push("Aspek Kepatuhan Pemungutan dan Penyetoran: " + parsed.kepatuhan);
  if (parsed.pelaporan && parsed.pelaporan !== "-") parts.push("Aspek Pelaporan dan Penatausahaan: " + parsed.pelaporan);
  if (parsed.kendala_belanja && parsed.kendala_belanja !== "-") parts.push("Aspek Kendala Pelaksanaan Belanja PNBP: " + parsed.kendala_belanja);
  if (parsed.permasalahan && parsed.permasalahan !== "-") parts.push("Aspek Permasalahan Penerimaan PNBP: " + parsed.permasalahan);
  if (parts.length) d.KESIMPULAN = parts.join(" ");
  if (parsed.rekomendasi && parsed.rekomendasi !== "-") d.REKOMENDASI = parsed.rekomendasi;

  // Update cells (kalau baris masih ada di DOM)
  const sp2 = splitKesimpulan(d.KESIMPULAN);
  const updateCell = (id, val) => { const el = document.getElementById(id); if (el) el.innerHTML = esc(val || "-"); };
  updateCell(`ikh-gmbr-${idx}`, d.GAMBARAN_UMUM);
  updateCell(`ikh-kep-${idx}`, sp2.kepatuhan);
  updateCell(`ikh-pel-${idx}`, sp2.pelaporan);
  updateCell(`ikh-knb-${idx}`, sp2.kendalaBelanja);
  updateCell(`ikh-prm-${idx}`, sp2.permasalahan);
  updateCell(`ikh-rek-${idx}`, d.REKOMENDASI);
  return true;
}

async function aiCleanupRow(idx) {
  const d = DATA[idx];
  if (!d) return;
  const btn = document.getElementById(`ai-btn-${idx}`);

  const apiKey = localStorage.getItem("anthropicApiKey");
  if (!apiKey) {
    alert('API key Anthropic belum diatur. Buka menu "Upload Data Monev PNBP" lalu isi API key di bagian atas terlebih dahulu.');
    return;
  }

  if (btn) { btn.disabled = true; btn.textContent = "⏳ ..."; }
  try {
    const result = await aiCleanupCore(idx, apiKey);
    if (result === "skip") {
      if (btn) { btn.disabled = false; btn.textContent = "✨ Rapikan"; }
      return;
    }
    if (btn) { btn.textContent = "✅ Rapi"; btn.classList.replace("bg-violet-50","bg-green-50"); btn.classList.replace("text-violet-700","text-green-700"); btn.classList.replace("border-violet-200","border-green-200"); }
  } catch (err) {
    console.error("AI cleanup error:", err);
    alert("Gagal memanggil Anthropic API: " + (err.message || err) + "\n\nPeriksa apakah API key valid dan memiliki kredit/saldo.");
    if (btn) { btn.disabled = false; btn.textContent = "❌ Gagal"; setTimeout(() => { btn.textContent = "✨ Rapikan"; }, 2000); }
  }
}

/* Ringkas AI Semua — proses batch seluruh Kanwil yang sedang difilter, dengan progress bar */
let aiBatchRunning = false;
async function aiCleanupAll() {
  if (aiBatchRunning) return;
  const apiKey = localStorage.getItem("anthropicApiKey");
  if (!apiKey) {
    alert('API key Anthropic belum diatur. Buka menu "Upload Data Monev PNBP" lalu isi API key di bagian atas terlebih dahulu.');
    return;
  }

  const targets = DATA
    .map((d, idx) => idx)
    .filter(idx => filterState.ikhtisar.has(DATA[idx].kanwilProvinsi));

  if (targets.length === 0) { alert("Tidak ada Kanwil yang dipilih pada filter."); return; }

  aiBatchRunning = true;
  const allBtn = document.getElementById("btnRingkasAiAll");
  const progressWrap = document.getElementById("aiProgressWrap");
  const progressBar = document.getElementById("aiProgressBar");
  const progressText = document.getElementById("aiProgressText");
  if (allBtn) { allBtn.disabled = true; allBtn.textContent = "⏳ Memproses..."; }
  if (progressWrap) progressWrap.classList.remove("hidden");

  let done = 0, failed = 0, skipped = 0;
  for (const idx of targets) {
    const d = DATA[idx];
    const btn = document.getElementById(`ai-btn-${idx}`);
    if (btn) { btn.disabled = true; btn.textContent = "⏳ ..."; }
    try {
      const result = await aiCleanupCore(idx, apiKey);
      if (result === "skip") {
        skipped++;
        if (btn) { btn.disabled = false; btn.textContent = "✨ Rapikan"; }
      } else {
        if (btn) { btn.textContent = "✅ Rapi"; btn.classList.replace("bg-violet-50","bg-green-50"); btn.classList.replace("text-violet-700","text-green-700"); btn.classList.replace("border-violet-200","border-green-200"); }
      }
    } catch (err) {
      console.error(`AI cleanup error (${d.kanwilProvinsi}):`, err);
      failed++;
      if (btn) { btn.disabled = false; btn.textContent = "❌ Gagal"; setTimeout(() => { if (btn) btn.textContent = "✨ Rapikan"; }, 2000); }
    }
    done++;
    const pct = Math.round((done / targets.length) * 100);
    if (progressBar) progressBar.style.width = pct + "%";
    if (progressText) progressText.textContent = `Meringkas AI: ${done} / ${targets.length} (${pct}%) — ${DATA[idx].kanwilProvinsi}`;
  }

  aiBatchRunning = false;
  if (allBtn) { allBtn.disabled = false; allBtn.textContent = "✨ Ringkas AI Semua"; }
  if (progressText) progressText.textContent = `Selesai: ${done}/${targets.length} diproses` + (skipped ? `, ${skipped} dilewati (kosong)` : "") + (failed ? `, ${failed} gagal` : "") + ".";
  setTimeout(() => { if (progressWrap) progressWrap.classList.add("hidden"); }, 5000);
}



function toggleEditRow(idx) {
  const cellIds = [`ikh-gmbr-${idx}`, `ikh-kep-${idx}`, `ikh-pel-${idx}`, `ikh-knb-${idx}`, `ikh-prm-${idx}`, `ikh-rek-${idx}`];
  const dataKeys = ['GAMBARAN_UMUM', null, null, null, null, 'REKOMENDASI']; // null = rebuild from KESIMPULAN

  const firstCell = document.getElementById(cellIds[0]);
  if (!firstCell) return;
  const isEditing = firstCell.contentEditable === "true";

  if (isEditing) {
    // Save: read back from contenteditable
    const d = DATA[idx];
    cellIds.forEach((id, i) => {
      const el = document.getElementById(id);
      if (!el) return;
      const val = el.innerText.trim();
      el.contentEditable = "false";
      el.style.outline = "";
      el.style.background = "";
      if (i === 0) d.GAMBARAN_UMUM = val === "-" ? "" : val;
      else if (i === 5) d.REKOMENDASI = val === "-" ? "" : val;
    });
    // Rebuild KESIMPULAN from 4 aspek cells
    const parts = [];
    const aspekLabels = ["Aspek Kepatuhan Pemungutan dan Penyetoran: ", "Aspek Pelaporan dan Penatausahaan: ", "Aspek Kendala Pelaksanaan Belanja PNBP: ", "Aspek Permasalahan Penerimaan PNBP: "];
    for (let i = 1; i <= 4; i++) {
      const el = document.getElementById(cellIds[i]);
      const val = el ? el.innerText.trim() : "";
      if (val && val !== "-") parts.push(aspekLabels[i-1] + val);
    }
    DATA[idx].KESIMPULAN = parts.join(" ");

    const editBtn = document.getElementById(`edit-btn-${idx}`);
    if (editBtn) { editBtn.textContent = "✏️ Edit"; editBtn.classList.replace("bg-blue-50","bg-slate-50"); editBtn.classList.replace("text-blue-700","text-slate-600"); editBtn.classList.replace("border-blue-200","border-slate-200"); }
  } else {
    // Enable editing
    cellIds.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.contentEditable = "true";
      el.style.outline = "2px solid #3b82f6";
      el.style.background = "#eff6ff";
    });
    const editBtn = document.getElementById(`edit-btn-${idx}`);
    if (editBtn) { editBtn.textContent = "💾 Simpan"; editBtn.classList.replace("bg-slate-50","bg-blue-50"); editBtn.classList.replace("text-slate-600","text-blue-700"); editBtn.classList.replace("border-slate-200","border-blue-200"); }
  }
}
