<style>
/* ── TORING Design System (Light Only) ── */
:root{
  --r:#C0392B;--rd:#8E2A1F;--rdd:#6B1E15;--r-bg:rgba(192,57,43,.08);
  --y:#F4C430;--ys:#FFE57A;--yb:#FFF8E1;
  --g:#16A34A;--g-bg:rgba(22,163,74,.10);
  --w:#F59E0B;--w-bg:rgba(245,158,11,.12);
  --info:#2563EB;--info-bg:rgba(37,99,235,.10);
  --t1:#1F2937;--t2:#6B7280;--t3:#9CA3AF;
  --b:#E5E7EB;--bg:#F9F7F2;--card:#FFFFFF;
  --rad:12px;--radsm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.08);
  --shadow-md:0 4px 12px rgba(0,0,0,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;height:100%;overflow:hidden;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--b);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:var(--t3);}
input,select,textarea,button{font-family:'Inter',sans-serif;}
textarea{resize:vertical;}
input[type=date]::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.5;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fu{animation:fadeUp .2s ease;}
@media print{.no-print{display:none!important;}body{background:#fff;color:#000;overflow:auto;height:auto;}}

/* ── LAYOUT ── */
#root{display:flex;flex-direction:column;height:100vh;background:var(--bg);overflow:hidden;}

/* ── HEADER ── */
.ikpa-hd{
  display:flex;align-items:center;gap:12px;
  padding:10px 20px;
  background:#FBE080;
  border-bottom:1px solid rgba(183,28,28,.15);
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  flex-shrink:0;position:relative;overflow:hidden;
}
.ikpa-hd::after{
  content:'';position:absolute;right:0;top:0;bottom:0;width:120px;
  background:linear-gradient(90deg,transparent,rgba(183,28,28,.06));
  pointer-events:none;
}
.hd-logo{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--rdd),var(--r));
  display:grid;place-items:center;flex-shrink:0;
  box-shadow:0 2px 8px rgba(107,19,9,.25);
}
.hd-logo svg{width:20px;height:20px;stroke:#FBE080;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.hd-title{line-height:1.2;}
.hd-title strong{font-size:14px;font-weight:700;color:#6D2C1D;display:block;}
.hd-title span{font-size:11px;color:#B71C1C;font-weight:500;}
.hd-spacer{flex:1;}
.hd-badge{
  font-size:11px;font-weight:600;color:#6D2C1D;
  background:rgba(183,28,28,.10);
  padding:4px 10px;border-radius:20px;border:1px solid rgba(183,28,28,.15);
  white-space:nowrap;
}
.hd-btn{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;font-weight:600;cursor:pointer;
  padding:6px 12px;border-radius:8px;border:none;
  transition:all .15s;white-space:nowrap;
}
.hd-btn.outline{background:rgba(255,255,255,.55);color:#6D2C1D;border:1px solid rgba(183,28,28,.20);}
.hd-btn.outline:hover{background:#fff;border-color:var(--r);}
.hd-btn.green{background:rgba(22,163,74,.12);color:#15803d;border:1px solid rgba(22,163,74,.25);}
.hd-btn.amber{background:rgba(245,158,11,.12);color:#92400e;border:1px solid rgba(245,158,11,.25);}
.hd-btn.primary{background:var(--r);color:#fff;}
.hd-btn.primary:hover{background:var(--rd);}
.hd-btn.admin-on{background:rgba(245,158,11,.15);color:#92400e;border:1px solid rgba(245,158,11,.35);}
.hd-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}

/* ── MAIN TABS (FAQ / OPEN PERIOD) ── */
.main-tabs{
  display:flex;align-items:center;gap:0;
  padding:0 20px;
  background:#fff;
  border-bottom:2px solid var(--b);
  flex-shrink:0;
}
.main-tab{
  padding:11px 18px;font-size:13px;font-weight:600;
  color:var(--t2);cursor:pointer;border:none;background:none;
  border-bottom:3px solid transparent;margin-bottom:-2px;
  display:flex;align-items:center;gap:6px;
  transition:color .15s;
}
.main-tab:hover{color:var(--rd);}
.main-tab.active{color:var(--r);border-bottom-color:var(--r);}
.main-tab svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.main-tab-spacer{flex:1;}
/* Search inside FAQ tab header */
.tab-search-wrap{padding:8px 20px;background:#fff;border-bottom:1px solid var(--b);flex-shrink:0;}
.tab-search{position:relative;max-width:400px;}
.tab-search input{
  width:100%;padding:8px 12px 8px 34px;
  border:1px solid var(--b);border-radius:8px;
  font-size:12px;background:var(--bg);color:var(--t1);outline:none;
  transition:border-color .15s;
}
.tab-search input:focus{border-color:var(--r);background:#fff;}
.tab-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--t3);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;pointer-events:none;}

/* ── FAQ 3-COL LAYOUT ── */
.faq-body{display:grid;grid-template-columns:200px 1fr 1fr;flex:1;min-height:0;overflow:hidden;}
.faq-sidebar{border-right:1px solid var(--b);overflow-y:auto;background:#fff;}
.faq-mid{border-right:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;}
.faq-mid-head{padding:12px 14px;border-bottom:1px solid var(--b);flex-shrink:0;background:#fff;}
.faq-mid-body{overflow-y:auto;flex:1;}
.faq-right{overflow-y:auto;padding:20px 22px;background:var(--bg);}

/* sidebar nav */
.nav-group-title{
  font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--t3);padding:12px 14px 4px;
}
.nav-ind{
  display:flex;align-items:center;gap:8px;
  width:100%;padding:8px 14px;
  background:none;border:none;border-left:3px solid transparent;
  color:var(--t2);font-size:11.5px;font-weight:500;
  cursor:pointer;text-align:left;transition:all .15s;
}
.nav-ind:hover{background:var(--yb);color:var(--rd);}
.nav-ind.active{background:var(--yb);border-left-color:var(--r);color:var(--r);font-weight:600;}
.nav-ind-icon{font-size:13px;flex-shrink:0;}
.nav-ind-label{flex:1;line-height:1.3;font-size:11px;}
.nav-ind-cnt{
  font-size:10px;font-weight:700;
  background:var(--b);color:var(--t2);
  padding:1px 6px;border-radius:8px;flex-shrink:0;
}
.nav-ind.active .nav-ind-cnt{background:var(--r);color:#fff;}

/* mid panel items */
.q-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:10px 14px;cursor:pointer;
  border-left:3px solid transparent;
  transition:all .12s;
}
.q-item:hover{background:var(--yb);}
.q-item.active{background:#FEF8EC;border-left-color:var(--r);}
.q-item-num{font-size:10px;color:var(--t3);font-weight:700;font-family:monospace;margin-top:1px;flex-shrink:0;}
.q-item-text{font-size:12px;color:var(--t1);line-height:1.45;flex:1;}
.q-item.active .q-item-text{color:var(--rd);font-weight:500;}

/* ── OPEN PERIOD LAYOUT ── */
.op-body{display:grid;grid-template-columns:340px 1fr;flex:1;min-height:0;overflow:hidden;}
.op-left{border-right:1px solid var(--b);overflow-y:auto;background:#fff;padding:14px;}
.op-right{overflow-y:auto;background:var(--bg);padding:20px 22px;}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--b);border-radius:var(--rad);padding:16px;box-shadow:var(--shadow);}
.card+.card{margin-top:12px;}
.card-title{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--r);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.card-title svg{width:14px;height:14px;stroke:var(--r);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── INPUTS ── */
.inp{
  width:100%;padding:8px 10px;
  border:1px solid var(--b);border-radius:8px;
  font-size:12px;color:var(--t1);background:#fff;outline:none;
  font-family:'Inter',sans-serif;transition:border-color .15s;
}
.inp:focus{border-color:var(--r);box-shadow:0 0 0 3px rgba(192,57,43,.08);}
.inp::placeholder{color:var(--t3);}
.field-label{font-size:11px;font-weight:600;color:var(--t2);display:block;margin-bottom:4px;}
.field-group{margin-bottom:10px;}
.field-row{display:grid;gap:8px;margin-bottom:10px;}
.field-row.col2{grid-template-columns:1fr 1fr;}
.field-row.col3{grid-template-columns:1fr 1fr 1fr;}
.field-row.col4{grid-template-columns:1fr 1fr 1fr 1fr;}

/* ── TYPE TOGGLE ── */
.type-toggle{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:3px;margin-bottom:12px;}
.type-btn{
  flex:1;padding:6px 0;border-radius:6px;border:none;
  font-size:12px;font-weight:600;cursor:pointer;
  background:transparent;color:var(--t2);transition:all .15s;
}
.type-btn.active{background:var(--r);color:#fff;box-shadow:0 1px 4px rgba(192,57,43,.25);}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:8px 16px;border-radius:8px;border:none;
  font-size:12px;font-weight:600;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.btn-primary{background:var(--r);color:#fff;}
.btn-primary:hover{background:var(--rd);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-secondary{background:var(--bg);color:var(--t2);border:1px solid var(--b);}
.btn-secondary:hover{background:var(--b);}
.btn-danger{background:#FEE2E2;color:var(--r);border:1px solid #FECACA;}
.btn-danger:hover{background:#FECACA;}
.btn-green{background:var(--g-bg);color:#15803d;border:1px solid rgba(22,163,74,.25);}
.btn-amber{background:var(--w-bg);color:#92400e;border:1px solid rgba(245,158,11,.25);}
.btn-sm{padding:4px 10px;font-size:11px;}

/* ── BADGE ── */
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;display:inline-block;white-space:nowrap;}
.badge.green{background:var(--g-bg);color:#15803d;}
.badge.red{background:var(--r-bg);color:var(--r);}
.badge.amber{background:var(--w-bg);color:#92400e;}
.badge.info{background:var(--info-bg);color:var(--info);}

/* ── RECORD LIST ITEM ── */
.rec-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;margin-bottom:4px;
  border:1px solid var(--b);border-radius:8px;
  cursor:pointer;background:#fff;transition:all .15s;
}
.rec-item:hover{border-color:var(--r);background:var(--yb);}
.rec-item.active{border-color:var(--r);background:#FEF8EC;}
.rec-kode{font-weight:700;font-size:12px;color:var(--info);flex-shrink:0;min-width:56px;}
.rec-nm{font-size:11px;color:var(--t1);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rec-meta{font-size:10px;color:var(--t3);flex-shrink:0;white-space:nowrap;}

/* ── RESULT BLOCK ── */
.result-block{background:#F0FDF4;border:1px solid #BBF7D0;border-radius:var(--rad);padding:16px;margin-bottom:12px;}
.result-header{font-weight:700;font-size:12.5px;color:#15803d;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;}
.result-cell{background:#fff;border:1px solid #BBF7D0;border-radius:7px;padding:7px 9px;}
.result-cell-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#15803d;margin-bottom:2px;}
.result-cell-value{font-size:11.5px;font-weight:600;color:#166534;word-break:break-all;}
.notif-box{background:#fff;border:1px solid #BBF7D0;border-radius:8px;padding:10px;margin-bottom:10px;font-size:12px;color:#374151;line-height:1.75;font-style:italic;}

/* ── DATE ERR ── */
.date-err{font-size:11px;color:var(--r);background:#FEE2E2;border:1px solid #FECACA;border-radius:7px;padding:6px 10px;margin-bottom:8px;}

/* ── PREVIEW NOTIF ── */
.preview-notif{background:var(--bg);border:1px solid var(--b);border-radius:8px;padding:10px;margin-bottom:10px;}
.preview-notif-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:4px;}
.preview-notif-text{font-size:11px;color:var(--t2);line-height:1.6;font-style:italic;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;}
.modal-box{background:#fff;border-radius:var(--rad);padding:24px;width:92%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:700;color:var(--rd);margin-bottom:16px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}

/* ── EMPTY STATE ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--t3);text-align:center;padding:40px 20px;flex:1;}
.empty-icon{width:48px;height:48px;border-radius:16px;background:var(--bg);display:grid;place-items:center;margin-bottom:4px;}
.empty-icon svg{width:26px;height:26px;stroke:var(--t3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.empty p{font-size:13px;font-weight:600;color:var(--t2);}
.empty span{font-size:12px;max-width:200px;line-height:1.5;}

/* ── ANSWER PANEL ── */
.answer-chip{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--yb);border:1px solid var(--y);
  padding:3px 10px;border-radius:20px;
  font-size:11px;font-weight:600;color:var(--rdd);margin-bottom:12px;
}
.answer-q{font-size:15px;font-weight:700;line-height:1.45;color:var(--t1);margin-bottom:12px;}
.answer-divider{height:2px;background:linear-gradient(90deg,var(--r),transparent);margin-bottom:14px;border-radius:1px;}
.answer-text{font-size:13.5px;line-height:1.9;color:var(--t2);white-space:pre-line;}
.feedback-row{margin-top:20px;padding-top:12px;border-top:1px solid var(--b);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}

/* ── SYNC STATUS ── */
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
.sync-dot.ok{background:var(--g);}
.sync-dot.err{background:var(--r);}
.sync-dot.loading{background:var(--w);animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── ADMINS ── */
.admin-tag{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--yb);border:1px solid var(--y);
  font-size:10px;font-weight:600;color:var(--rdd);
  padding:3px 8px;border-radius:6px;
}
</style>
</head>

/* ── HELPERS ── */
let _sMap=null;
function getSM(){if(!_sMap&&window.SATKER_DB?.length){_sMap=new Map();window.SATKER_DB.forEach(r=>_sMap.set(r[0],r));}return _sMap;}
function lookupSatker(k){const m=getSM();if(!m)return null;return m.get(String(k).trim().padStart(6,'0'))||null;}
function fmtDate(s){if(!s)return'';const[y,mo,d]=s.split('-');return`${parseInt(d)} ${MOS[parseInt(mo)-1]} ${y}`;}
function fmtDateShort(s){if(!s)return'';const[y,mo,d]=s.split('-');return`${d}/${mo}/${y}`;}
function todayStr(){return new Date().toISOString().split('T')[0];}
function isActive(op){return op.tgl_akhir>=todayStr();}
function validDates(mulai,akhir){return mulai&&akhir&&akhir>mulai;}
function dbId(){return Date.now()+'_'+Math.random().toString(36).slice(2,7);}

function exportXL(ops,type,filterAdmin){
  const rows=ops.filter(o=>o.type===type&&(!filterAdmin||o.admin_name===filterAdmin));
  if(!rows.length){alert(`Tidak ada data ${type}${filterAdmin?' untuk '+filterAdmin:''}.`);return;}
  const now=new Date();
  let aoa,sn,fn;
  if(type==='realisasi'){
    /* Kolom: Kanwil DJPB | KPPN | BAES1 | Satker | Periode | Tahun Anggaran | Tanggal Mulai | Tanggal Akhir */
    aoa=[
      ['Kanwil DJPB','KPPN','BAES1','Satker','Periode','Tahun Anggaran','Tanggal Mulai','Tanggal Akhir'],
      ...rows.map(o=>{
        const baes1=o.kd_unit||'';
        const mIdx=m=>MOS.indexOf(m)+1;
        const fromIdx=mIdx(o.periode_from);const toIdx=mIdx(o.periode_to);
        const periodeStr=(o.periode_from&&o.periode_to)
          ?(fromIdx===toIdx?`${fromIdx}`:`${fromIdx} s.d. ${toIdx}`)
          :(o.periode_bulan||'');
        return[o.kd_kanwil||o.nm_kanwil||'',o.kd_kppn||'',baes1,o.kode_satker,periodeStr,o.tahun||'',fmtDateShort(o.tgl_mulai),fmtDateShort(o.tgl_akhir)];
      })
    ];
    sn='Realisasi Caput';fn=`rekap_realisasi_${now.toISOString().split('T')[0]}.xlsx`;
  }else{
    /* Kolom: Tahun Anggaran | Kode Satker | Kode Program | Kode Kegiatan | Kode KRO | Kode RO | Periode Awal Dibuka | Tanggal Mulai | Tanggal Akhir */
    aoa=[
      ['Tahun Anggaran','Kode Satker','Kode Program','Kode Kegiatan','Kode KRO','Kode RO','Periode Awal Dibuka','Tanggal Mulai','Tanggal Akhir'],
      ...rows.map(o=>[o.tahun_anggaran||'',o.kode_satker,o.kd_program||'',o.kd_kegiatan||'',o.kd_kro||'',o.kd_ro||'',o.periode_awal||'',fmtDateShort(o.tgl_mulai),fmtDateShort(o.tgl_akhir)])
    ];
    sn='Target Caput';fn=`rekap_target_${now.toISOString().split('T')[0]}.xlsx`;
  }
  const ws=XLSX.utils.aoa_to_sheet(aoa);const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,sn);XLSX.writeFile(wb,fn);
}

/* ── EXCEL PARSE ── */
function parseXLDate(v){
  if(!v&&v!==0)return'';
  // Excel numeric date serial
  if(typeof v==='number'){
    try{const d=XLSX.SSF.parse_date_code(v);return`${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;}
    catch(e){return'';}
  }
  const s=String(v).trim();
  // YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  // DD/MM/YYYY  ← format Indonesia & Excel Indonesia
  const m1=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m1)return`${m1[3]}-${m1[2].padStart(2,'0')}-${m1[1].padStart(2,'0')}`;
  // DD-MM-YYYY
  const m2=s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
  if(m2)return`${m2[3]}-${m2[2].padStart(2,'0')}-${m2[1].padStart(2,'0')}`;
  // MM/DD/YYYY (US format fallback)
  const m3=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2})$/);
  if(m3)return`20${m3[3]}-${m3[1].padStart(2,'0')}-${m3[2].padStart(2,'0')}`;
  return'';
}
function isValidDate(s){return s&&/^\d{4}-\d{2}-\d{2}$/.test(s);}
function parseXLUpload(file,type){
  return new Promise((res,rej)=>{
    const rd=new FileReader();
    rd.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        const recs=[];
        rows.slice(2).forEach(r=>{
          if(type==='realisasi'){
            const kode=String(r[3]||'').trim();if(!kode)return;
            const si=lookupSatker(kode)||[];const pf=String(r[4]||'').trim(),pt=String(r[6]||'').trim();
            recs.push({id:dbId(),type:'realisasi',
              kode_satker:kode.padStart(6,'0'),nm_satker:si[1]||'',kl:si[2]||'',
              kd_kppn:si[3]||String(r[1]||'').trim(),nm_kppn:si[4]||'',nm_kanwil:si[5]||'',kd_kanwil:si[6]||String(r[0]||'').trim(),kd_unit:si[7]||'',
              periode_from:pf,periode_to:pt,
              periode_bulan:pf&&pt?(pf===pt?`${pf} ${r[7]||''}`:`${pf} s.d ${pt} ${r[7]||''}`):'-',
              tahun:String(r[7]||'2026').trim(),tgl_mulai:parseXLDate(r[8]),tgl_akhir:parseXLDate(r[9]),
              admin_name:'',created_at:new Date().toISOString()});
            // Skip jika tgl_akhir tidak valid atau sudah lewat
            const lastRec=recs[recs.length-1];
            if(!isValidDate(lastRec?.tgl_akhir)||lastRec.tgl_akhir<todayStr())recs.pop();
          }else{
            const kode=String(r[1]||'').trim();if(!kode)return;
            const si=lookupSatker(kode)||[];
            recs.push({id:dbId(),type:'target',
              tahun_anggaran:String(r[0]||'2026').trim(),kode_satker:kode.padStart(6,'0'),nm_satker:si[1]||'',kl:si[2]||'',
              kd_program:String(r[2]||'').trim(),kd_kegiatan:String(r[3]||'').trim(),
              kd_kro:String(r[4]||'').trim(),kd_ro:String(r[5]||'').trim(),
              periode_awal:String(r[6]||'').trim(),tgl_mulai:parseXLDate(r[7]),tgl_akhir:parseXLDate(r[8]),
              admin_name:'',created_at:new Date().toISOString()});
            const lastRec=recs[recs.length-1];
            if(!isValidDate(lastRec?.tgl_akhir)||lastRec.tgl_akhir<todayStr())recs.pop();
          }
        });res(recs);
      }catch(e){rej(e);}
    };rd.readAsArrayBuffer(file);
  });
}

  /* ── Init Firebase & listeners ── */
  useEffect(()=>{
    let attempts=0;
    function tryInit(){
      const db=getDB();
      if(!db){
        if(attempts++<10)setTimeout(tryInit,500);
        else setSyncStatus('err');
        return;
      }
      setDbReady(true);

      /* ── Listen FAQ ── */
      db.ref(FB.faq()).on('value',snap=>{
        const val=snap.val();
        if(val){setFaq(prev=>({...INIT_FAQ,...val}));}
        else{
          // First load — seed with INIT_FAQ
          db.ref(FB.faq()).set(INIT_FAQ);
        }
        setSyncStatus('ok');
      },()=>setSyncStatus('err'));

      /* ── Listen Ops ── */
      db.ref(FB.ops()).on('value',snap=>{
        const val=snap.val();
        const today=todayStr();
        if(val){
          const map={};
          Object.entries(val).forEach(([k,v])=>{map[k]={...v,_fbKey:k};});
          // Filter aktif (tampilkan yang belum expired) — auto-delete TIDAK dilakukan
          // agar import bulk tidak race dengan listener

        }else{setOps([]);setOpsMap({});}

      /* ── Listen Admins ── */
      db.ref(FB.admins()).on('value',snap=>{
        const val=snap.val();

        else if(!val){db.ref(FB.admins()).set({list:['Admin X','Admin Y','Admin Z']});}
      });
    }
    tryInit();
    return()=>{
      const db=getDB();
      if(db){db.ref(FB.faq()).off();db.ref(FB.ops()).off();db.ref(FB.admins()).off();}
    };

  async function handleUpload(e){
    const file=e.target.files?.[0];if(!file)return;
    setUpStatus('⏳ Membaca file...');

      if(recs.length===0){

        e.target.value='';setTimeout(()=>setUpStatus(''),7000);return;
      }
      setUpStatus(`⏳ Mengimpor ${recs.length} data...`);
      // Push satu per satu dengan delay kecil agar listener tidak race
      for(let i=0;i<recs.length;i++){
        await addOpToFB(recs[i]);
        if((i+1)%10===0)setUpStatus(`⏳ ${i+1}/${recs.length} data diimpor...`);
      }
      setUpStatus(`✅ ${recs.length} data berhasil diimpor ke daftar aktif!`);
    }catch(err){

  /* ── Paste import parser ── */
  function doPasteImport(){
    const lines=pasteText.trim().split('\n').filter(l=>l.trim());
    const errs=[];const parsed=[];
    const SKIP_HDRS=/^(program|kegiatan|kro|ro|kode)$/i;
    lines.forEach((line,li)=>{
      const cols=line.split('\t').map(c=>c.trim());
      if(cols.length===4&&cols.every(c=>SKIP_HDRS.test(c)))return; // header row
      if(cols.length!==4){errs.push(`Baris ${li+1}: harus 4 kolom, ditemukan ${cols.length}`);return;}
      const [prog,keg,kro,ro]=cols;
      if(!prog)errs.push(`Baris ${li+1}: Kode Program kosong`);
      if(!keg)errs.push(`Baris ${li+1}: Kode Kegiatan kosong`);
      if(!kro)errs.push(`Baris ${li+1}: Kode KRO kosong`);
      if(!ro)errs.push(`Baris ${li+1}: Kode RO kosong`);
      if(prog&&keg&&kro&&ro)parsed.push({id:dbId(),kd_program:prog,kd_kegiatan:keg,kd_kro:kro,kd_ro:ro});
    });
    // Deteksi duplikat dalam paste
    const seen=new Map();const dups=[];
    parsed.forEach((r,i)=>{const k=`${r.kd_program}|${r.kd_kegiatan}|${r.kd_kro}|${r.kd_ro}`;
      if(seen.has(k))dups.push(`Duplikat: ${k} (baris ${seen.get(k)+1} & ${i+1})`);else seen.set(k,i);
    });
    setPasteErrs(errs);setPasteDups(dups);
    if(errs.length===0){
      setRoRows(parsed.length>0?parsed:[initRO()]);
      setShowPaste(false);setPasteText('');setPasteErrs([]);setPasteDups([]);
    }
  }

                </div>
                {opMulti.map(op=><ResultBlock key={op.id} rec={op} savedMode={false}/>)}

                    else{setOpFormT({...initFT(),kode:opSearch.padStart(6,'0'),nm_satker:r?.[1]||'',kl:r?.[2]||''});setRoRows([initRO()]);}

                </button>
              </div>

            {/* ── FORM REALISASI ── */}
            {opState==='new'&&opType==='realisasi'&&(

                <AdminSelect/>
                <div className="field-row col2">
                  <div>
                    <label className="field-label">Kode Satker *</label>
                    <input className="inp" value={opForm.kode} onChange={e=>fillSatker(e.target.value,false)}/>
                  </div>
                  <div>
                    <label className="field-label">K/L</label>
                    <input className="inp" value={opForm.kl} onChange={e=>setOpForm(f=>({...f,kl:e.target.value}))} placeholder="auto dari DB"/>
                  </div>
                </div>
                <div className="field-group">
                  <label className="field-label">Nama Satker</label>
                  <input className="inp" value={opForm.nm_satker} onChange={e=>setOpForm(f=>({...f,nm_satker:e.target.value}))} placeholder="auto dari DB"/>

                <div className="field-row col2">
                  <div>
                    <label className="field-label">Kanwil</label>
                    <input className="inp" value={opForm.kanwil} onChange={e=>setOpForm(f=>({...f,kanwil:e.target.value}))} placeholder="auto dari DB"/>

                  <div>

                    <select value={opForm.tahun} onChange={e=>setOpForm(f=>({...f,tahun:e.target.value}))} className="inp" style={{width:80}}>

                    <label className="field-label">Ditutup s.d Tanggal *</label>

                    <div className="preview-notif-text">{previewNotifR()}</div>
                  </div>
                )}
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <button className="btn btn-primary" onClick={doSaveR}
                    disabled={!!dateErr||!opForm.kode||!opForm.tgl_mulai||!opForm.tgl_akhir||!opForm.periode_from||!opForm.periode_to||!opAdmin}

                  <button className="btn btn-secondary" onClick={resetOp}>Batal</button>
                  {!opAdmin&&<span style={{fontSize:11,color:'var(--w)'}}>⚠ Pilih admin terlebih dahulu</span>}
                </div>

                <div className="field-row col2">

                    <label className="field-label">Tahun Anggaran *</label>
                    <select className="inp" value={opFormT.tahun} onChange={e=>setOpFormT(f=>({...f,tahun:e.target.value}))}>

                </div>
                <div className="field-group">
                  <label className="field-label">Nama Satker</label>
                  <input className="inp" value={opFormT.nm_satker} onChange={e=>setOpFormT(f=>({...f,nm_satker:e.target.value}))} placeholder="auto dari DB"/>

                </div>
                <div className="field-group">
                  <label className="field-label">K/L</label>
                  <input className="inp" value={opFormT.kl} onChange={e=>setOpFormT(f=>({...f,kl:e.target.value}))} placeholder="auto dari DB"/>

                        Paste dari Excel
                      </button>
                      <button type="button" className="btn btn-secondary btn-sm"
                        onClick={addRoRow}>

                  <div style={{display:'flex',flexDirection:'column',gap:4}}>
                    {roRows.map((ro,idx)=>{
                      const incomplete=!ro.kd_program||!ro.kd_kegiatan||!ro.kd_kro||!ro.kd_ro;
                      return(
                        <div key={ro.id} style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr 28px',gap:4,alignItems:'center'}}>
                          <input className="inp" value={ro.kd_program}
                            onChange={e=>updRoRow(idx,'kd_program',e.target.value)}

                          <input className="inp" value={ro.kd_kegiatan}
                            onChange={e=>updRoRow(idx,'kd_kegiatan',e.target.value)}
                            placeholder="cth: 7223"
                            style={{borderColor:!ro.kd_kegiatan?'#FECACA':'var(--b)',fontSize:12,padding:'6px 8px'}}/>
                          <input className="inp" value={ro.kd_kro}
                            onChange={e=>updRoRow(idx,'kd_kro',e.target.value)}
                            placeholder="cth: AEH"
                            style={{borderColor:!ro.kd_kro?'#FECACA':'var(--b)',fontSize:12,padding:'6px 8px'}}/>
                          <input className="inp" value={ro.kd_ro}
                            onChange={e=>updRoRow(idx,'kd_ro',e.target.value)}
                            placeholder="cth: 001"
                            style={{borderColor:!ro.kd_ro?'#FECACA':'var(--b)',fontSize:12,padding:'6px 8px'}}/>
                          <button type="button"
                            onClick={()=>delRoRow(idx)}
                            disabled={roRows.length===1}
                            style={{
                              width:26,height:26,border:'1px solid #FECACA',borderRadius:6,
                              background:roRows.length===1?'var(--bg)':'#FEF2F2',
                              color:roRows.length===1?'var(--t3)':'var(--r)',
                              cursor:roRows.length===1?'not-allowed':'pointer',
                              display:'grid',placeItems:'center',flexShrink:0
                            }}>
                            <svg viewBox="0 0 24 24" style={{width:12,height:12,stroke:'currentColor',fill:'none',strokeWidth:2.5,strokeLinecap:'round'}}><line x1="5" y1="12" x2="19" y2="12"/></svg>
                          </button>
                        </div>
                      );
                    })}
                  </div>

                  {/* Row count + warning */}
                  <div style={{display:'flex',alignItems:'center',gap:8,marginTop:6}}>
                    <span style={{fontSize:11,color:'var(--t3)'}}>{roRows.length} RO</span>

                      <span style={{fontSize:11,color:'var(--w)'}}>⚠ Lengkapi semua field yang kosong</span>
                    )}
                    {(()=>{
                      const seen=new Map();const dups=[];
                      roRows.forEach((r,i)=>{const k=`${r.kd_program}|${r.kd_kegiatan}|${r.kd_kro}|${r.kd_ro}`;
                        if(r.kd_program&&r.kd_ro){if(seen.has(k))dups.push(i+1);else seen.set(k,i+1);}
                      });
                      return dups.length>0?<span style={{fontSize:11,color:'var(--r)'}}>⚠ Duplikat di baris: {dups.join(', ')}</span>:null;
                    })()}
                  </div>

                <div className="field-row col3">
                  <div>
                    <label className="field-label">Periode Awal Dibuka *</label>
                    <input className="inp" value={opFormT.periode_awal} onChange={e=>setOpFormT(f=>({...f,periode_awal:e.target.value}))} placeholder="cth: 4"/>
                  </div>
                  <div>
                    <label className="field-label">Tanggal Mulai *</label>
                    <input type="date" className="inp" value={opFormT.tgl_mulai} onChange={e=>{setOpFormT(f=>({...f,tgl_mulai:e.target.value}));checkDates(e.target.value,opFormT.tgl_akhir);}}/>
                  </div>
                  <div>
                    <label className="field-label">Ditutup s.d *</label>
                    <input type="date" className="inp" value={opFormT.tgl_akhir} onChange={e=>{setOpFormT(f=>({...f,tgl_akhir:e.target.value}));checkDates(opFormT.tgl_mulai,e.target.value);}}/>
                  </div>
                </div>
                {dateErr&&<div className="date-err">{dateErr}</div>}
                {previewNotifT()&&(
                  <div className="preview-notif">

                    <div className="preview-notif-text">{previewNotifT()}</div>
                  </div>

                  <button className="btn btn-primary" onClick={doSaveT}
                    disabled={!!dateErr||!opFormT.kode||!opFormT.tgl_mulai||!opFormT.tgl_akhir||!opAdmin||!opFormT.periode_awal||!roRows.some(r=>r.kd_program&&r.kd_kegiatan&&r.kd_kro&&r.kd_ro)}
                    style={{opacity:(!!dateErr||!opFormT.kode||!opFormT.tgl_mulai||!opFormT.tgl_akhir||!opAdmin||!opFormT.periode_awal||!roRows.some(r=>r.kd_program&&r.kd_kegiatan&&r.kd_kro&&r.kd_ro))?.4:1}}>

                  </button>
                  <button className="btn btn-secondary" onClick={resetOp}>Batal</button>
                  {!opAdmin&&<span style={{fontSize:11,color:'var(--w)'}}>⚠ Pilih admin terlebih dahulu</span>}
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ══════════════ MODAL PASTE RO ══════════════ */}
      {showPaste&&(
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget){setShowPaste(false);setPasteText('');setPasteErrs([]);setPasteDups([]);}}}>
          <div className="modal-box" style={{maxWidth:580}}>
            <div className="modal-title">
              <svg viewBox="0 0 24 24" style={{width:18,height:18,stroke:'var(--rd)',fill:'none',strokeWidth:1.8,strokeLinecap:'round',strokeLinejoin:'round',display:'inline',marginRight:7,verticalAlign:'middle'}}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
              Paste Daftar RO dari Excel
            </div>
            <div style={{fontSize:12,color:'var(--t2)',background:'var(--yb)',border:'1px solid var(--y)',borderRadius:8,padding:'10px 12px',marginBottom:12,lineHeight:1.7}}>
              <strong style={{color:'var(--rdd)'}}>Cara penggunaan:</strong><br/>
              1. Buka file Excel MyIntress → pilih kolom <strong>Program, Kegiatan, KRO, RO</strong> (4 kolom berurutan)<br/>
              2. Seleksi baris data (tanpa header) → <kbd style={{background:'#fff',border:'1px solid var(--b)',borderRadius:4,padding:'1px 5px',fontSize:11}}>Ctrl+C</kbd><br/>
              3. Klik di area bawah → <kbd style={{background:'#fff',border:'1px solid var(--b)',borderRadius:4,padding:'1px 5px',fontSize:11}}>Ctrl+V</kbd> → klik <strong>Import</strong>
            </div>
            <div className="field-group">
              <label className="field-label">Area Paste (Tab-separated dari Excel)</label>
              <textarea
                value={pasteText}
                onChange={e=>{setPasteText(e.target.value);setPasteErrs([]);setPasteDups([]);}}
                placeholder={"Contoh (4 kolom tab-separated):\nProgram\tKegiatan\tKRO\tRO\nEK\t7223\tAEH\t001"}
                className="inp"
                rows={8}
                style={{fontFamily:'monospace',fontSize:12,lineHeight:1.6}}
                autoFocus
              />
            </div>
            <div style={{fontSize:11,color:'var(--t3)',marginBottom:10}}>
              {pasteText.trim()&&(()=>{
                const lines=pasteText.trim().split('\n').filter(l=>l.trim());
                const dataLines=lines.filter(l=>{const c=l.split('\t');return!(c.length===4&&c.every(x=>/^(program|kegiatan|kro|ro|kode)$/i.test(x.trim())));});
                return<span>Terdeteksi <strong>{dataLines.length} baris</strong> data</span>;
              })()}
            </div>
            {pasteErrs.length>0&&(
              <div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:8,padding:'10px 12px',marginBottom:10}}>
                <div style={{fontWeight:700,fontSize:11,color:'var(--r)',marginBottom:6}}>⛔ Error ({pasteErrs.length})</div>
                {pasteErrs.map((e,i)=><div key={i} style={{fontSize:11,color:'var(--r)',lineHeight:1.6}}>{e}</div>)}
              </div>
            )}
            {pasteDups.length>0&&(
              <div style={{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:8,padding:'10px 12px',marginBottom:10}}>
                <div style={{fontWeight:700,fontSize:11,color:'#92400e',marginBottom:6}}>⚠ Peringatan Duplikat</div>
                {pasteDups.map((d,i)=><div key={i} style={{fontSize:11,color:'#92400e',lineHeight:1.6}}>{d}</div>)}
                <div style={{fontSize:11,color:'#92400e',marginTop:6}}>Data duplikat akan tetap diimport. Hapus baris yang tidak diperlukan setelah import.</div>
              </div>
            )}
            <div className="modal-actions">
              <button className="btn btn-secondary" onClick={()=>{setShowPaste(false);setPasteText('');setPasteErrs([]);setPasteDups([]);}}>Batal</button>
              <button className="btn btn-primary" onClick={doPasteImport} disabled={!pasteText.trim()}
                style={{opacity:!pasteText.trim()?.4:1}}>
                <svg viewBox="0 0 24 24" style={{width:13,height:13,stroke:'#fff',fill:'none',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'}}><polyline points="20 6 9 17 4 12"/></svg>
                Import ke Form
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ══════════════ MODAL ADD FAQ ══════════════ */}
      {showAdd&&(
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget){setShowAdd(false);setAddQ('');setAddA('');}}}>
          <div className="modal-box">
            <div className="modal-title">Tambah Pertanyaan FAQ</div>
            <div className="field-group">
              <label className="field-label">Indikator / Topik *</label>
              <select value={addTopic} onChange={e=>setAddTopic(e.target.value)} className="inp" style={{color:addTopic?'var(--t1)':'var(--t3)'}}>
                <option value="">Pilih indikator...</option>
                {IND.map(i=><option key={i.id} value={i.id}>{i.no}. {i.label}</option>)}
              </select>
            </div>
            <div className="field-group">
              <label className="field-label">Pertanyaan *</label>
              <input value={addQ} onChange={e=>setAddQ(e.target.value)} placeholder="Tuliskan pertanyaan yang sering diajukan..." className="inp"/>
            </div>
            <div className="field-group">
              <label className="field-label">Jawaban *</label>
              <textarea value={addA} onChange={e=>setAddA(e.target.value)} rows={5}
                placeholder="Tuliskan jawaban lengkap... (gunakan • untuk bullet, Enter untuk paragraf baru)"
                className="inp" style={{lineHeight:1.6}}/>
            </div>
            <div className="modal-actions">
              <button className="btn btn-secondary" onClick={()=>{setShowAdd(false);setAddQ('');setAddA('');}}>Batal</button>
              <button className="btn btn-primary" onClick={handleAddFaq} disabled={!addTopic||!addQ||!addA}
                style={{opacity:(!addTopic||!addQ||!addA)?.4:1}}>Simpan FAQ</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
